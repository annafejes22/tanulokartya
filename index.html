  {
    id: 12,
    cim: "Megismerő funkciók fejlődése",
    tetelSzoveg: "Mutassa be a megismerő funkciók (érzékelés, észlelés, figyelem, emlékezet, képzelet, gondolkodás) fejlődésének sajátosságait újszülöttkortól kisiskoláskorig!",
    kartya: [
      { k: "Melyek a megismerő funkciók?", v: "Érzékelés, észlelés, figyelem, emlékezet, képzelet, gondolkodás – ezek teszik lehetővé, hogy a külső világ információit feldolgozzuk." },
      { k: "Mi az érzékelés és az észlelés különbsége?", v: "Érzékelés: az inger hatása az érzékszervekre (pl. fény a szemre). Észlelés: az érzékletek értelmezése, értelmessé tétele az agyban (pl. ez egy alma)." },
      { k: "Hogyan fejlődik az érzékelés újszülöttkorban?", v: "Látás: 30 cm-re éles, arcot preferál. Hallás: fejlett, hangtól reagál. Tapintás, íz, szag: fejlett. Az összes érzékszerv működik, de felnőtt szinttől elmarad." },
      { k: "Hogyan fejlődik a figyelem?", v: "Újszülöttnél involuntáris (reflex-szerű). Csecsemőnél szelektív (arcot, mozgást figyel). Kisgyermeknél rövid, de szándékos. Óvodásnál 10-15 perc. Kisiskolásnál 20-30 perc." },
      { k: "Mi az önkéntelen figyelem?", v: "Automatikus, szándéktalan figyelem – valami erős, új, érdekes inger vonja magára (pl. hangos zaj). Ez az alapvető figyelemforma csecsemőkorban." },
      { k: "Mi a szándékos figyelem?", v: "Tudatos, irányított figyelem, amelyet akaratlagosan tartunk fenn egy feladaton. Kb. 3 évtől fejlődik ki, és iskoláskorban válik meghatározóvá." },
      { k: "Hogyan fejlődik az emlékezet?", v: "Csecsemőnél rövid felismerési emlékezet. Kisgyermeknél epizodikus emlékezet (élmények). Óvodásnál szándékos memorizálás megjelenik. Kisiskolásnál stratégiák alakulnak." },
      { k: "Mi a deklaratív és procedurális emlékezet?", v: "Deklaratív: tények és élmények emlékezete ('tudás'). Procedurális: cselekvések automatizált emlékezete ('hogyan csinálom') – pl. kerékpározás." },
      { k: "Hogyan fejlődik a képzelet?", v: "2 évtől szimbolikus játékban jelenik meg. Óvodásnál virágjában van – fantázia és valóság keveredik. Kisiskolásnál realisztikusabb lesz." },
      { k: "Hogyan fejlődik a gondolkodás Piaget szerint?", v: "Szenzomotoros (0-2) → Preoperatív (2-7) → Konkrét műveleti (7-11) → Formális műveleti (12+) – egymásra épülő szakaszok." },
      { k: "Mi a szenzomotoros gondolkodás?", v: "0-2 éves kor. A gyerek cselekvéssel, érzékeléssel ismeri meg a világot. Nincs szimbolikus gondolkodás – ami kézben van, az valóságos." },
      { k: "Mi a konzerváció fogalma?", v: "Piaget fogalma: kb. 7 éves kortól érti meg a gyerek, hogy az anyag mennyisége nem változik az alak megváltozásával (pl. gömbölyű agyag → hosszú agyag = ugyanannyi)." },
      { k: "Hogyan fejlődik a figyelem az óvodáskorban?", v: "Az óvodás kb. 10-15 percig képes koncentrálni. Mozgásos, játékos, változatos feladatoknál hosszabb a figyelemtartama." },
      { k: "Mi a veleszületett emlékezet?", v: "Az újszülöttnek nincs élményre épülő emlékezete, de veleszületett preferenciái vannak – pl. az anya hangját felismeri, mert méhen belül hallotta." },
      { k: "Miért nem emlékeznek az emberek csecsemőkorukra?", v: "Infantilis amnézia: a hippocampus (emlékezeti régió) még nem érett az életesemények tárolásához – ezért nem maradnak epizodikus emlékek 3-4 éves kor előttről." },
      { k: "Hogyan fejleszthetjük a figyelmet SNI-s gyerekeknél?", v: "Rövid feladatok, sok váltás, érzékletes anyagok, strukturált környezet, jutalom az erőfeszítésért, vizuális kiegészítők alkalmazása." },
      { k: "Mi a munkamemória (rövid távú memória)?", v: "Rövid ideig tárol aktív információt (kb. 7 elem, 20 másodpercig). Korlátolt kapacitású – az iskola tanulási nehézségeinek fontos faktora." },
      { k: "Hogyan fejleszthető az emlékezet?", v: "Ismétlés, csoportosítás (chunking), asszociációk, mnemotechnikák, értelmes tanulás (összefüggések), mozgásos bevésés." },
      { k: "Mi a gondolkodás fejlesztésének módja iskoláskorban?", v: "Problémamegoldó feladatok, kísérletezés, vita, projekt, analógiák keresése, ok-okozati összefüggések keresése, nyílt végű kérdések." },
      { k: "Miért fontos az érzékszervi stimuláció csecsemőkorban?", v: "Az érzékleti ingerek serkentik az idegrendszer fejlődését – szegény ingerkörnyezetben (depriváció) a megismerő funkciók fejlődése visszamarad." },
    ],
    fogalmak: [
      { f: "Érzékelés", m: "Amikor az érzékszerveink (szem, fül, bőr) befogadják a külső világ jelzéseit. Pl. a szemed érzékeli a fényt." },
      { f: "Észlelés", m: "Az érzékelt ingereket az agyunk értelmezi és felismeri. Pl. a szemed látja a fényt – az agyad felismeri, hogy ez egy alma." },
      { f: "Figyelem", m: "Az a képesség, hogy az összes inger közül csak egyre koncentrálunk. Pl. tanóra alatt csak a tanárra figyelünk (kellene)." },
      { f: "Emlékezet", m: "Ami megtörtént, azt elraktározzuk és elő tudjuk hívni. Többféle van: rövid távú (munkamemória) és hosszú távú emlékezet." },
      { f: "Képzelet", m: "Képeket alkotunk olyan dolgokról, amelyek nincsenek jelen. Pl. elképzeled, hogy hogyan fog kinézni a nyaralás. Óvodásnál nagyon élénk!" },
      { f: "Gondolkodás", m: "Problémák megoldása, összefüggések keresése, következtetés. Fejlődik – 7 éves előtt konkréthoz kötött, utána egyre elvontabb." },
      { f: "Munkamemória", m: "A 'rövid emlékezet' – egyszerre csak néhány dolgot tudunk egyszerre fejben tartani. Ha sok mindent kell egyszerre megjegyezni, betelik." },
    ]
  },
  {
    id: 13,
    cim: "Szociálpszichológia alapfogalmai",
    tetelSzoveg: "Ismertesse a szociálpszichológia fogalmát, tárgyát és mutassa be a szociálpszichológia alapfogalmait: csoport, szerep, státusz, előítélet, deviancia",
    kartya: [
      { k: "Mi a szociálpszichológia?", v: "A szociálpszichológia azt vizsgálja, hogyan befolyásolja mások jelenléte, véleménye és viselkedése az egyén gondolkodását, érzelmeit és cselekedeteit." },
      { k: "Mi a csoport fogalma?", v: "Két vagy több személy, akik között tartós interakció, közös cél, közös normák és csoportidentitás alakult ki." },
      { k: "Milyen típusú csoportok léteznek?", v: "Elsődleges (familia, barátok – személyes, meghitt) és másodlagos (iskola, munkahely – formálisabb, funkcionális) csoportok." },
      { k: "Mi a csoportszerep?", v: "A csoport által elvárt viselkedésmód, amelyet a csoporttagoknak be kell tölteniük (pl. vezető, mediátor, bohóc, szorgalmas)." },
      { k: "Mi a státusz?", v: "Az egyén rangsora, tekintélye, elismertsége a csoporton belül – meghatározza, mennyire hallgatnak rá, mekkora befolyása van." },
      { k: "Mi a szerep és státusz összefüggése?", v: "A magas státuszú személytől elvárják a vezető szerepet. A szerep betöltése viszont emelheti a státuszt – egymást erősítik." },
      { k: "Mi az előítélet?", v: "Negatív érzelmi és kognitív beállítódás valakivel szemben anélkül, hogy valódi személyes tapasztalatunk lenne róluk – általában egy csoporthoz tartozásuk alapján." },
      { k: "Hogyan keletkezik az előítélet?", v: "Sztereotípiákból, az idegencsoporttal (outgroup) szembeni félelemből, ismerethiányból, szocializáció útján átvett negatív véleményekből." },
      { k: "Mi a sztereotípia?", v: "Leegyszerűsített, általánosított kép egy csoportról – nem veszi figyelembe az egyéni különbségeket (pl. 'minden X csoport tagja Y')." },
      { k: "Hogyan különbözik a sztereotípia az előítélettől?", v: "A sztereotípia kognitív (gondolkodásbeli) általánosítás. Az előítélet érzelmileg negatív és cselekvésre hajlamosít – diszkriminációhoz vezet." },
      { k: "Mi a diszkrimináció?", v: "Az előítéleten alapuló hátrányos megkülönböztetés cselekvésben – pl. nem veszik fel munkára, nem fogadják be az iskolai közösségbe." },
      { k: "Mi a deviancia fogalma?", v: "A deviancia az adott társadalmi normáktól való eltérés – eltérő viselkedés, amely megsérti a közmegállapodott szabályokat." },
      { k: "Milyen típusú deviancia létezik?", v: "Pozitív deviancia (pl. zseni, forradalmár), negatív deviancia (bűnözés, önkárosítás). Mindkettő normáktól való eltérés." },
      { k: "Mi a csoportkohézió?", v: "Az összetartó erő, amely a csoportot egységben tartja. Erős kohézió → hatékony együttműködés, de csoportnyomás veszélyével." },
      { k: "Mi a konformitás?", v: "Alkalmazkodás a csoportnormákhoz – akár saját véleményünk ellenére. Asch kísérlete: a résztvevők nyilvánvalóan helytelen válaszokat adtak, csak hogy beleolvadjanak." },
      { k: "Mi a csoportnyomás?", v: "A csoport elvárásai olyan erősen hatnak, hogy az egyén megváltoztatja viselkedését, véleményét a csoporthoz való tartozás érdekében." },
      { k: "Mi a szociális facilitáció?", v: "Mások jelenléte javítja a jól ismert, automatikus feladatok teljesítményét – de rontja az újszerű, nehéz feladatokét." },
      { k: "Mi a bystander-effektus?", v: "Minél többen vannak jelen egy segítséget igénylő helyzetben, annál kevésbé avatkoznak be – mindenki azt gondolja, 'majd a másik megteszi'." },
      { k: "Hogyan csökkenthetjük az előítéleteket az iskolában?", v: "Személyes kontaktus az előítélet tárgyával, pozitív visszajelzések, inklúzív szemlélet, pedagógus modellezése, kooperatív feladatok." },
      { k: "Mi a referenciakeret fogalma?", v: "Azok az értékek, normák és tapasztalatok, amelyek alapján megítélünk helyzeteket. Más referenciakeretből ugyanaz a helyzet másképp látszik." },
    ],
    fogalmak: [
      { f: "Szociálpszichológia", m: "Azt vizsgálja, hogyan hatunk egymásra. Miért viselkedünk másképp, ha egyedül vagyunk, mint ha csoportban? Miért alakulnak ki előítéletek?" },
      { f: "Csoport", m: "Emberek, akik rendszeresen találkoznak, közös céljuk van és szabályaik. Pl. osztály, familia, sportcsapat." },
      { f: "Szerep", m: "Amit elvárnak tőled a csoportban. Pl. az osztályban valaki a 'vezető', valaki a 'bohóc', valaki a 'szorgalmas'." },
      { f: "Státusz", m: "Mennyire tekintélyes valaki a csoportban. Magas státusz = többen hallgatnak rá, elfogadják a véleményét." },
      { f: "Előítélet", m: "Amikor negatívan ítélünk meg valakit anélkül, hogy valójában ismernénk – csak azért, mert egy csoporthoz tartozik." },
      { f: "Sztereotípia", m: "Leegyszerűsített kép egy csoportról. Nem mindenki ilyen! A sztereotípia figyelmen kívül hagyja az egyéni különbségeket." },
      { f: "Deviancia", m: "Eltérés a normától. Lehet negatív (pl. bűnözés) vagy pozitív (pl. zseni, aki másképp gondolkodik, mint mindenki más)." },
      { f: "Konformitás", m: "Alkalmazkodunk a csoporthoz, még ha nem értünk egyet. 'Ha mindenki másképp gondolja, biztos nekem van igazam... vagy mégsem?'" },
    ]
  },
  {
    id: 14,
    cim: "Nevelési stílusok, nevelői attitűd",
    tetelSzoveg: "Mutassa be a nevelési – vezetési stílusokat, valamint a nevelői attitűd formáit! Ismertesse a gyermekek, tanulók közötti kapcsolatok feltérképezésének lehetőségét!",
    kartya: [
      { k: "Mi a nevelési stílus fogalma?", v: "A nevelő azon jellemző, viszonylag tartós magatartásformáinak összessége, amelyeket a nevelt irányában alkalmaz – a szeretet, a kontroll és a kommunikáció mintázata." },
      { k: "Mi a tekintélyelvű (autoritárius) nevelő jellemzője?", v: "Magas kontroll, alacsony melegség. 'Ezt mondom, ezt teszed.' Következménye: engedelmesség, alacsony önbizalom, kreativitás gátlása." },
      { k: "Mi az engedékeny (permisszív) nevelő jellemzője?", v: "Alacsony kontroll, magas melegség. 'Mindent szabad.' Következménye: a gyerek nem ismeri a határokat, frusztrációtűrése alacsony." },
      { k: "Mi a megkívánó (autoritatív/demokratikus) nevelő jellemzője?", v: "Magas kontroll + magas melegség. Következetes határok + magyarázat + szeretet. Ez a legjobb eredményekhez vezető stílus." },
      { k: "Mi a nevelői attitűd fogalma?", v: "A nevelő érzelmi beállítódása, viszonyulása a neveltek felé – elfogadó, elutasító, közömbös, túlvédő stb." },
      { k: "Milyen nevelői attitűd formák léteznek?", v: "Elfogadó-demokratikus, elutasító-autoriter, közömbös-elhanyagoló, túlvédő-engedékeny – ezek az emocionális klíma és a kontroll tengelyén különböznek." },
      { k: "Hogyan hat az elutasító nevelői attitűd?", v: "A gyermek nem érzi magát szeretve → alacsony önértékelés, magatartásproblémák, szorongás, agresszió kialakulásának kockázata." },
      { k: "Mi a szociometria?", v: "Moreno által kidolgozott módszer, amellyel a csoporton belüli kapcsolatokat (ki kihez vonzódik, kit utasít el) mérjük – kérdőív és szociogram segítségével." },
      { k: "Mi a szociogram?", v: "A szociometriai felmérés grafikus ábrázolása – nyilak mutatják az elfogadást és elutasítást. Segít azonosítani a vezéreket, peremhelyzetűeket, magányosokat." },
      { k: "Ki a csillag típusú tanuló?", v: "Aki sok pozitív szavazatot kap – a csoport által erősen kedvelt és elfogadott tanuló. Informális vezető." },
      { k: "Ki a peremhelyzetű tanuló?", v: "Aki kevés kapcsolattal rendelkezik – sem különösebben kedvelt, sem elutasított. Kívül van a csoport aktív életén." },
      { k: "Ki az elutasított (izolált) tanuló?", v: "Akit sok negatív szavazat ér, akit aktívan kerülnek vagy elutasítanak. Fokozott pedagógiai figyelmet igényel." },
      { k: "Miért fontos a csoportklíma feltérképezése?", v: "Ha ismerjük a csoport dinamikáját, célzottan tudjuk segíteni a kirekesztett tanulókat és megelőzni a bullying-ot." },
      { k: "Mi a bullying és hogyan különböztethető meg a konfliktustól?", v: "Bullying: szándékos, ismétlődő ártás hatalmi egyenlőtlenség esetén. Konfliktus: egyszeri, erőviszonyok egyenlők. Bullying esetén azonnali beavatkozás szükséges." },
      { k: "Hogyan befolyásolja a nevelési stílus az SNI-s gyermek fejlődését?", v: "Az SNI-s gyermeknek különösen fontos a kiszámítható, következetes, elfogadó és türelmes nevelői attitűd – ez adja az érzelmi biztonságot a fejlődéshez." },
      { k: "Mi a kettős kötés (double bind) fogalma?", v: "Egymásnak ellentmondó üzenetek (pl. szóban: 'szeretlek', testbeszéddel: elutasítás) – a gyermek nem tudja, melyiket higgye. Pszichés káros hatású." },
      { k: "Mi az osztályfőnök szerepe a csoportdinamikában?", v: "A pedagógus feltérképezi a kapcsolatokat, beemeli a peremhelyzetűeket, kooperatív feladatokkal bővíti a kapcsolati hálót, mediál a konfliktusokban." },
      { k: "Mi a hatalmi távolság fogalma?", v: "Milyen nagy a távolság a nevelő és a nevelt között – autoritárius nevelőnél nagy, demokratikusnál kisebb. Kisebb távolság → nyíltabb kommunikáció." },
      { k: "Mikor hatékony a jutalmazás?", v: "Ha azonnali, konkrét, arányos és következetes. Az arányos dicséret emeli az önértékelést – a túlzott dicséret inflálódik és hiteltelenné válik." },
      { k: "Miért fontos a pedagógus önismerete?", v: "Az önismeret segíti felismerni saját előítéleteinket, elvárásainkat, nevelési stílusunkat – és tudatosabban, rugalmasabban alkalmazkodni a neveltek szükségleteihez." },
    ],
    fogalmak: [
      { f: "Nevelési stílus", m: "Ahogy a szülő vagy pedagógus bánik a gyerekkel – mennyi szeretetet és mennyi szabályt kombinál. A legjobb: sok szeretet + következetes határok." },
      { f: "Autoritárius nevelő", m: "'Azt teszed, amit mondok.' Sok szabály, kevés magyarázat és melegség. A gyerek engedelmeskedik, de nem fejleszti a saját ítélőképességét." },
      { f: "Demokratikus nevelő", m: "'Megbeszéljük, megmagyarázom, és következetes határokat tartok.' A kutatások szerint ez vezet a legjobb eredményekhez." },
      { f: "Permisszív nevelő", m: "'Csináld, amit akarsz.' Sok szeretet, de kevés határ – a gyerek nem tanulja meg a szabályokat és a frusztráció kezelését." },
      { f: "Szociometria", m: "Módszer, amivel feltérképezzük, ki kit szeret és ki kit kerül egy csoportban. A szociogramból kiderül, ki van kívül, ki a vezér." },
      { f: "Szociogram", m: "A szociometria eredményének rajzos ábrázolása. Nyilak mutatják a vonzódást és az elutasítást – azonnal látszik, ki az izolált." },
      { f: "Nevelői attitűd", m: "A nevelő érzelmi viszonyulása a gyerekhez – elfogadó, közömbös, elutasító? Ez mélyen befolyásolja a gyerek fejlődését és önértékelését." },
    ]
  },
  {
    id: 15,
    cim: "Gyógypedagógia fogalma, tankötelezettség",
    tetelSzoveg: "Ismertesse a gyógypedagógia fogalmát, tárgyát, célját! Mutassa be a gyógypedagógiai tankötelezettség főbb jellemzőit! Értelmezze az alábbi fogalmakat: különleges bánásmód, BTMN, SNI, integráció, inklúzió, szegregáció.",
    kartya: [
      { k: "Mi a gyógypedagógia fogalma?", v: "A gyógypedagógia az a tudományág és gyakorlati tevékenység, amely az akadályozott fejlődésű, sérült, fogyatékos személyek nevelésével, oktatásával, fejlesztésével és rehabilitációjával foglalkozik." },
      { k: "Mi a gyógypedagógia tárgya?", v: "Az akadályozott fejlődésű, sérült személyek nevelési, oktatási, fejlesztési szükségletei és az ezekre adott speciális pedagógiai válaszok." },
      { k: "Mi a gyógypedagógia célja?", v: "A fogyatékos személyek optimális fejlesztése, minőségi élet biztosítása, társadalmi beilleszkedés elősegítése és az önállóság maximalizálása." },
      { k: "Mi a különleges bánásmód fogalma?", v: "A különleges bánásmódot igénylő gyermekek: SNI-s tanulók, BTMN-es tanulók, kiemelkedően tehetséges tanulók – mindannyian egyéni, differenciált ellátást igényelnek." },
      { k: "Mi a BTM (Beilleszkedési, Tanulási, Magatartási Nehézség)?", v: "Nem fogyatékosság, hanem funkcionális nehézség – pl. diszlexia veszélye, hiperaktivitás, beilleszkedési gondok. Pedagógiai szempontból speciális módszereket igényel." },
      { k: "Mi az SNI két kategóriája?", v: "1. SNI 'A': súlyosabb fogyatékosság (vak, süket, mozgáskorlátozott, értelmi akadályozott, autizmus) – többletforrásra jogosult. 2. SNI 'B': enyhébb fogyatékosság." },
      { k: "Mit jelent a gyógypedagógiai tankötelezettség?", v: "Az SNI-s gyermekeknek is kötelező a tankötelezettség – speciális intézményben, integrált formában vagy fejlesztő nevelés-oktatásban teljesíthető." },
      { k: "Mi a fejlesztő nevelés-oktatás?", v: "A legsúlyosabb fogyatékosságú gyermekek számára biztosított iskolai forma – ahol az oktatási cél helyett a fejlesztés és gondozás kap prioritást." },
      { k: "Hogyan biztosítja az állam az SNI-s gyermekek ellátását?", v: "Ingyenes szakszolgáltatás, fejlesztő pedagógus, gyógypedagógus, segítő munkatárs, segédeszközök, korai fejlesztés – ezek mind törvényi jogok." },
      { k: "Mi az integráció fogalma?", v: "Az SNI-s tanuló a többségi intézménybe kerül, ahol speciális segítséggel vesz részt az oktatásban – a rendszer minimálisan változik köré." },
      { k: "Mi az inklúzió fogalma?", v: "A teljes befogadás elvén alapuló szemlélet – az iskola és a tanítás módszertana alakul a tanuló sokszínűségéhez. Mindenki aktív tagja a közösségnek." },
      { k: "Mi a szegregáció?", v: "Az SNI-s tanulókat speciális intézménybe irányítják – ott homogén csoportban kapnak szakmai ellátást. Súlyos esetekben indokolt lehet." },
      { k: "Mi az EGYMI feladata?", v: "Egységes Gyógypedagógiai Módszertani Intézmény – utazó gyógypedagógusokat biztosít integrált iskolákba, tanácsadást és fejlesztést nyújt." },
      { k: "Mi a Szakértői Bizottság szerepe?", v: "Megállapítja az SNI meglétét, típusát és fokát, javaslatot tesz az oktatás formájára (integrált/szegregált), és meghatározza a szükséges ellátást." },
      { k: "Mi az egyéni fejlesztési terv (EFT)?", v: "Személyre szabott, rendszeresen felülvizsgált terv, amely tartalmazza a fejlesztési célokat, módszereket, a felelős személyeket és az értékelési szempontokat." },
      { k: "Milyen elvek mentén dolgozik a gyógypedagógia?", v: "Humanitás, a személy méltósága, az optimális fejlesztés elve, normalizáció, integráció, közösségi beágyazottság, individualizáció." },
      { k: "Mi a normalizáció elve?", v: "Mindenki – fogyatékosságától függetlenül – megilleti a normális életkörülmények és életritmus lehetősége. A gyógypedagógia ezt igyekszik biztosítani." },
      { k: "Mi a komplex rehabilitáció?", v: "Az orvosi + pedagógiai + szociális + foglalkozási rehabilitáció együttese – a teljes ember minden területén nyújt segítséget a beilleszkedéshez." },
      { k: "Hogyan kapcsolódik a gyógypedagógia más tudományokhoz?", v: "Pszichológia, medicina (neurológia, pszichiátria), szociológia, jog, informatika – a gyógypedagógia interdiszciplináris tudomány." },
      { k: "Mi a gyógypedagógiai asszisztens szerepe a rendszerben?", v: "A gyógypedagógus irányítása alatt dolgozik – megvalósítja a fejlesztési tervet, gondozási feladatokat végez, segíti a mindennapi tevékenységeket." },
    ],
    fogalmak: [
      { f: "Gyógypedagógia", m: "Az a tudomány és szakma, amely a valamilyen fogyatékossággal élő emberek nevelésével, fejlesztésével és beilleszkedésük segítésével foglalkozik." },
      { f: "Különleges bánásmód", m: "Nem mindenki fejlődik ugyanúgy. Különleges bánásmódot igényel az SNI-s gyerek, a BTMN-es gyerek és a kiemelkedően tehetséges is." },
      { f: "BTMN", m: "Nem fogyatékosság, de a gyereknek segítség kell. Pl. nehezen olvassa az olvasást, nehezen figyel – ezekre speciális módszerek szükségesek." },
      { f: "SNI", m: "Sajátos Nevelési Igény – valódi fogyatékosság (vak, süket, értelmi akadályozottság stb.). Törvényi jogok és extra erőforrások járnak hozzá." },
      { f: "Normalizáció", m: "Mindenki megérdemli a normális életet – még akkor is, ha fogyatékossággal él. A gyógypedagógia azt segíti, hogy minél önállóbb legyen." },
      { f: "Egyéni fejlesztési terv", m: "Egy terv, amit pontosan ehhez az egy gyerekhez írnak. Mi a cél? Hogyan érjük el? Ki felelős? Mikor vizsgáljuk felül?" },
    ]
  },
  {
    id: 16,
    cim: "Szakértői bizottság, korai fejlesztés",
    tetelSzoveg: "Mutassa be a szakértői bizottság tevékenységét, a gyógypedagógiai diagnózis felállításának lényeges jellemzőit! Ismertesse a korai fejlesztés és gondozás fogalmát, feladatát, tartalmát!",
    kartya: [
      { k: "Mi a Szakértői Bizottság?", v: "Szakértői Bizottság (korábban SZBI) a pedagógiai szakszolgálat része. Feladata: fogyatékosság diagnosztizálása, javaslat az ellátásra, fejlesztési javaslat." },
      { k: "Kik a szakértői bizottság tagjai?", v: "Gyógypedagógus (vezető), pszichológus és orvos (szakorvos). Szükség szerint logopédus, konduktor, szociális munkás is részt vesz." },
      { k: "Mi a szakértői vélemény tartalma?", v: "A fogyatékosság megállapítása, annak típusa és foka, oktatási forma javaslata (integrált/szegregált), szükséges fejlesztések és segédeszközök." },
      { k: "Mi a gyógypedagógiai diagnózis?", v: "Komplex állapotfelmérés, amely nemcsak a fogyatékosságot azonosítja, hanem a gyermek erősségeit, fejlesztési lehetőségeit és szükségleteit is feltárja." },
      { k: "Hogyan zajlik a szakértői bizottság vizsgálata?", v: "Anamnézis felvétele → pszichológiai vizsgálat → gyógypedagógiai vizsgálat → orvosi vélemény → komplex értékelés → szülőkkel való megbeszélés → szakvélemény." },
      { k: "Mi az anamnézis?", v: "A gyermek teljes fejlődéstörténete: terhesség, szülés, korai fejlődési mérföldkövek, betegségek, familia- és szociális háttér." },
      { k: "Mi a korai fejlesztés fogalma?", v: "0-5 éves korban fogyatékosság kockázatával élő vagy fogyatékos gyermekeknek nyújtott komplex fejlesztési és gondozási szolgáltatás." },
      { k: "Miért kritikus a korai fejlesztés?", v: "Az idegrendszer az élet első éveiben a legplasztikusabb – a korai beavatkozás sokkal hatékonyabb, mint a késői. A fejlődési zavarok hatása jobban kompenzálható." },
      { k: "Mi a korai fejlesztés tartalma?", v: "Gyógypedagógiai fejlesztés, pszichológiai gondozás, szülők támogatása, logopédia, konduktív pedagógia, gyógytorna, szükség esetén orvosi kezelés." },
      { k: "Mi a korai fejlesztés formái?", v: "Ambuláns (a gyermek jár be), otthoni (szakember megy ki), intézményes (bölcsőde, korai fejlesztő csoport)." },
      { k: "Mi a korai fejlesztés célja?", v: "Megelőzni a másodlagos fogyatékosságok kialakulását, optimalizálni a fejlődést, szülőket megerősíteni, és elősegíteni az óvodai integrációt." },
      { k: "Mi az Egységes Gyógypedagógiai Módszertani Intézet (EGYMI) szerepe?", v: "Utazó gyógypedagógiai szolgáltatást biztosít integrált iskolákba, és korai fejlesztő tevékenységet is végezhet." },
      { k: "Milyen vizsgálati módszereket alkalmaz a szakértői bizottság?", v: "Standardizált tesztek (Bender, Raven, WISC stb.), megfigyelés, interjú szülővel, dokumentumelemzés (óvodai jellemzés), klinikai megfigyelés." },
      { k: "Mi a felülvizsgálat?", v: "A szakértői véleményt rendszeresen felül kell vizsgálni (általában 2-3 évente), mert a gyermek állapota és szükségletei változhatnak." },
      { k: "Milyen jogai vannak a szülőknek a diagnosztikai folyamatban?", v: "Jelen lehetnek a vizsgálaton, bepillanthatnak a véleménybe, fellebbezhetnek, és dönthetnek az oktatási forma megválasztásáról (korlátokkal)." },
      { k: "Mi a rizikógyermek fogalma?", v: "Olyan gyermek, akinél a fogyatékosság kialakulásának fokozott veszélye áll fenn – pl. koraszülöttség, genetikai ok, kedvezőtlen környezet." },
      { k: "Mi a korai gondozás fogalma?", v: "A korai fejlesztés részterülete – az egészségügyi gondozás, a hygiénés és ápolási feladatok, szükséges eszközök biztosítása." },
      { k: "Hogyan vonják be a szülőket a korai fejlesztésbe?", v: "A szülők aktív részesei a fejlesztésnek – megtanulják otthon is végezni a fejlesztő tevékenységeket, ezzel megtöbbszörözik a hatást." },
      { k: "Mi a gyógypedagógiai asszisztens feladata a korai fejlesztésben?", v: "A gyógypedagógus irányítása alatt részt vesz a gondozásban, a mindennapi tevékenységek előkészítésében, szülők tájékoztatásának támogatásában." },
      { k: "Milyen dokumentumok kísérik az SNI-s gyermeket az ellátás során?", v: "Szakértői vélemény, egyéni fejlesztési terv, haladási napló, óvodai/iskolai jellemzés, orvosi dokumentáció." },
    ],
    fogalmak: [
      { f: "Szakértői Bizottság", m: "Egy csapat szakember (gyógypedagógus, pszichológus, orvos), akik megvizsgálják, hogy a gyereknek van-e valamilyen fogyatékossága, és milyen segítségre van szüksége." },
      { f: "Gyógypedagógiai diagnózis", m: "Nem csak a 'mi a baj' megállapítása, hanem annak feltárása is, miben erős a gyerek, és hogyan lehet a legjobban fejleszteni." },
      { f: "Korai fejlesztés", m: "Ha egy kis gyereknél fogyatékosságra utaló jeleket látnak, minél hamarabb elkezdik a fejlesztést – az agy az első években a legrugalmasabb." },
      { f: "Anamnézis", m: "A gyerek 'élettörténete' – hogyan zajlott a terhesség, a szülés, mikor ülött, járt, beszélt, volt-e beteg stb. Fontos alap a diagnózishoz." },
      { f: "Rizikógyermek", m: "Olyan gyerek, akinél nagyobb az esélye valamilyen fejlődési problémának – pl. koraszülött, vagy genetikai okokból." },
      { f: "Felülvizsgálat", m: "A diagnózist és a fejlesztési tervet rendszeresen újra kell nézni, mert a gyerek fejlődik, változnak a szükségletei." },
    ]
  },
  {
    id: 17,
    cim: "Tanulásban akadályozottság",
    tetelSzoveg: "Mutassa be a tanulásban akadályozottság fogalmát, okait, tüneteit, valamint a tanulásban akadályozottak nevelésének-oktatásának főbb jellemzőit! Fejtse ki az önálló életvitel lehetőségeit a tanulásban akadályozottak körében!",
    kartya: [
      { k: "Mi a tanulásban akadályozottság fogalma?", v: "A tanulásban akadályozottság enyhe fokú intellektuális károsodás, amely az iskolai tanulási teljesítményt számottevően gátolja, de az önálló életvitelt nem zárja ki." },
      { k: "Hogyan viszonyul a tanulásban akadályozottság az enyhe értelmi fogyatékossághoz?", v: "A tanulásban akadályozottság tágabb fogalom – nem minden tanulásban akadályozott tanuló értelmileg fogyatékos. Magában foglalja az enyhe értelmi fogyatékosságot, de más okú tanulási nehézségeket is." },
      { k: "Milyen okai lehetnek a tanulásban akadályozottságnak?", v: "Organikus (agykárosodás, genetikai), környezeti (depriváció, elhanyagolás), funkcionális (érzelmi zavar), vagy ezek kombinációja." },
      { k: "Mik a tanulásban akadályozottság főbb tünetei?", v: "Gyenge érzékelés, sajátos figyelem (rövid, könnyen elterelhető), emlékezeti problémák, lassú tanulási tempó, absztrakcióra való korlátozott képesség." },
      { k: "Hogyan jellemezhető a tanulásban akadályozott tanuló figyelme?", v: "Rövid figyelmi kapacitás, könnyen elvonható, nehézkes szándékos figyelem – de a számára érdekes témában tartósabb koncentrációra képes." },
      { k: "Hogyan jellemezhető az emlékezet tanulásban akadályozottság esetén?", v: "Lassú bevésés, gyors felejtés, a mechanikus emlékezet viszonylag jobb az összefüggő emlékezetnél. Ismétlés és strukturálás sokat segít." },
      { k: "Milyen nevelési-oktatási elvek érvényesek?", v: "Fokozott szemléletesség, lassabb haladási tempó, kisebb lépések, azonnali megerősítés, sok ismétlés, kompenzálás erős oldalakon, praktikus életközeli tartalmak." },
      { k: "Mi a tanulásban akadályozottak iskoláztatási formái?", v: "Enyhe értelmi fogyatékosok iskolája (szegregált), integrált általános iskola (megfelelő támogatással), fejlesztő nevelés-oktatás (legsúlyosabb esetekben)." },
      { k: "Mi a tantárgy-pedagógia különlegessége TA tanulóknál?", v: "Életközeli, funkcionális tartalmak, cselekvésbe ágyazott tanulás, kevesebb elvont elméleti anyag, több gyakorlati készségfejlesztés." },
      { k: "Mi az önálló életvitel lehetőségei?", v: "Megfelelő nevelés és fejlesztés esetén: önellátás, egyszerű munkavégzés, önálló lakhatás (esetleg támogatott), szociális kapcsolatok, közösségi részvétel." },
      { k: "Mi a szupervízió és támogatott életvitel?", v: "A tanulásban akadályozott felnőtt élhet önállóan, de esetleg szüksége van időszakos támogatásra – pl. ügyintézésben, pénzkezelésben, egészségügyi döntésekben." },
      { k: "Milyen foglalkoztatási lehetőségek nyílnak?", v: "Védett (szociális) foglalkoztatás, nyílt munkaerőpiaci foglalkoztatás (egyszerűbb munkák), szociális szövetkezet." },
      { k: "Miért fontos a família szerepe?", v: "A tanulásban akadályozott személy fejlődésében a familia elfogadása, realisztikus elvárásai és a fejlesztésbe való bevonás döntő." },
      { k: "Mi az életviteli kompetenciák fejlesztése?", v: "Önkiszolgálás, főzés, pénzkezelés, közlekedés, ügyintézés – ezeket célzottan kell tanítani a mindennapi élethez való alkalmazkodás érdekében." },
      { k: "Hogyan segíti a gyógypedagógiai asszisztens a tanulásban akadályozottakat?", v: "Egyéni segítségnyújtás a feladatmegoldásban, önkiszolgálás támogatása, szociális helyzetek segítése, érzelmi biztonság biztosítása." },
      { k: "Mi az intrinzik motiváció szerepe TA tanulóknál?", v: "Ha a tanuló sikerélményeket él meg, erősödik az önbizalma és motivációja. A túl nehéz vagy könnyű feladat egyaránt demotiváló." },
      { k: "Mi a szenzomotoros fejlesztés jelentősége?", v: "A tanulásban akadályozottak körében a szenzomotoros képességek fejlesztése segíti a kognitív teljesítményt és a mindennapi önkiszolgálást." },
      { k: "Mi az ADHD és a tanulásban akadályozottság kapcsolata?", v: "Az ADHD tanulásban akadályozottság nélkül is megjelenhet. Ha együtt jár, a figyelemzavar és impulzivitás tovább nehezíti a tanulási folyamatot." },
      { k: "Milyen segédeszközök segítik a tanulásban akadályozottat?", v: "Képes kommunikációs eszközök, feladatrendező kártyák, vizuális tervek, egyszerűsített szövegek, manipulatív taneszközök." },
      { k: "Mi a differenciált értékelés lényege TA tanulóknál?", v: "Nem az osztálytársaikhoz hasonlítják, hanem saját korábbi teljesítményükhöz mérten értékelik – ez megőrzi az önbizalmát és motiváltságát." },
    ],
    fogalmak: [
      { f: "Tanulásban akadályozottság", m: "Enyhe mértékű nehézség az intellektuális fejlődésben – nem érti olyan könnyen az elvont dolgokat, lassabban tanul, de önállóan tud élni." },
      { f: "Enyhe értelmi fogyatékosság", m: "A tanulásban akadályozottság egyik formája. Az IQ kb. 50-70 közé esik – a mindennapi élet nagy részét önállóan kezeli." },
      { f: "Funkcionális tanulás", m: "Életközeli, hasznosítható tudás tanítása – pl. bevásárlás, pénzkezelés, buszjegy vásárlása. Nem elvont elméletek." },
      { f: "Támogatott életvitel", m: "Segítség, ami lehetővé teszi az önálló életet. Nem mindent csinálnak helyette, hanem csak annyit segítenek, amennyit valóban szükséges." },
      { f: "Védett foglalkoztatás", m: "Speciális munkahelyek fogyatékos személyeknek, ahol alkalmazkodnak a képességeikhez. Lassabb tempó, több segítség, egyszerűbb feladatok." },
    ]
  },
  {
    id: 18,
    cim: "Értelmi akadályozottság",
    tetelSzoveg: "Mutassa be az értelmi akadályozottság fogalmát, okait, tüneteit, valamint az értelmileg akadályozottak nevelésének, oktatásának, főbb jellemzőit! Ismertesse gondozásuk speciális feladatait!",
    kartya: [
      { k: "Mi az értelmi akadályozottság fogalma?", v: "Középsúlyos és súlyos mértékű intellektuális károsodás, amely az összes pszichikus funkciót érinti, és az önálló életvitelt nagymértékben korlátozza." },
      { k: "Mi az értelmi akadályozottság és a tanulásban akadályozottság különbsége?", v: "Mértékben és az önállóság fokában különböznek. Az értelmileg akadályozott személy nagyobb függőségben él, több gondozást és speciálisabb ellátást igényel." },
      { k: "Melyek az értelmi akadályozottság okai?", v: "Genetikai (Down-szindróma, PKU), pre-, peri- és posztnatális agykárosodás (szülési oxigénhiány, agyhártya-gyulladás), anyagcserebetegségek, ismeretlen ok." },
      { k: "Mi a Down-szindróma?", v: "21-es kromoszóma-triszómia okozza. Jellemzői: sajátos arckép, izomtónus gyengeség, szív- és emésztőszervi rendellenességek, értelmi akadályozottság (különböző fokban)." },
      { k: "Milyen fokozatai vannak az értelmi akadályozottságnak?", v: "1. Enyhe (IQ 50-70): TA körébe sorolódik. 2. Középsúlyos (IQ 35-50). 3. Súlyos (IQ 20-35). 4. Mélysúlyos (IQ <20)." },
      { k: "Mik az értelmi akadályozottság főbb tünetei?", v: "Késett fejlődési vonalak minden területen, korlátozott szókincs és kommunikáció, korlátozott absztrakcióra való képesség, adaptív viselkedés hiányosságai." },
      { k: "Mi az adaptív viselkedés?", v: "A mindennapi élethez szükséges készségek összessége: önkiszolgálás, kommunikáció, szociális készségek, önirányítás. Az értelmi akadályozottság megítélésének kulcsa." },
      { k: "Milyen nevelési elvek érvényesek?", v: "Fejlesztő pedagógia elvei: egyéni szükségletekre épített fejlesztés, cselekvéses tanulás, minden kis lépés értékelése, érzelmi biztonság, família bevonása." },
      { k: "Mi a fejlesztő nevelés-oktatás?", v: "A legsúlyosabb értelmi akadályozottságú tanulóknak biztosított oktatási forma – ahol a cél nem tantárgyi tudás, hanem az alapvető funkciók és önellátás fejlesztése." },
      { k: "Milyen speciális gondozási feladatok vannak?", v: "Személyes higiénia (fürdés, fogmosás, öltözés), étkezés segítése (evőeszközök, diéta), gyógyszerelés, mozgásgyakorlatok, inkontinencia kezelése." },

      { k: "Milyen gondok merülhetnek fel a gyógyszerszedésnél?", v: "Elutasítás, felejtés, túlzott vagy elégtelen adag. Az asszisztens feladata a gyógyszeradagolás monitorozása és a gyógypedagógusnak való jelzés." },

      { k: "Hogyan kommunikáljunk értelmileg akadályozottakkal?", v: "Rövid, egyszerű mondatok, sok szemléltetés, képek, gesztusok, AAK (augmentatív-alternatív kommunikáció) eszközei, türelem és ismétlés." },
      { k: "Mi az AAK (augmentatív-alternatív kommunikáció)?", v: "Kommunikációt segítő eszközök és módszerek gyűjtőneve – kommunikációs tábla, képkártyák, szoftverek, szimbolikus jelrendszerek." },

      { k: "Mi az értelmi akadályozottság és a tankötelezettség kapcsolata?", v: "Az értelmileg akadályozottak is tankötelesek – a fejlesztő nevelés-oktatás keretében teljesítik a tankötelezettséget." },
      { k: "Mi az életút fogalma az értelmi akadályozottság kontextusában?", v: "Az értelmileg akadályozott személynek is van életútja – gyermekkor → intézményes nevelés → felnőttkor (lakóotthon/szülői ház) → foglalkoztatás → időskor." },
      { k: "Hogyan segítheti az asszisztens a terápiás csapat munkáját?", v: "Megfigyeléseit jelzi a gyógypedagógusnak, betartja a fejlesztési tervet, következetes napi rutint tart fenn, szülőkkel kommunikál a pedagógus útmutatása szerint." },

  {

      { k: "Hogyan fejlődik a vak gyermek nyelvhasználata?", v: "Általában jó verbális képességek alakulnak ki, mert a hallás és a kommunikáció kompenzálja a látáshiányt – de a fogalmak tartalma szegényebb lehet." },
      { k: "Mi az önkiszolgálás speciális problémája látássérülteknél?", v: "Tájékozódás a saját testben és környezetben, öltözés, szépségápolás – ezeket szisztematikusan, tapintásos visszajelzéssel kell megtanítani." },
      { k: "Mi a támpontrendszerű közlekedés?", v: "A tájékozódási képzés módszere: a vak személy fix pontokat (tapintós jelzések, sarkok, hangjelzők) tanul meg, és ezek alapján navigál." },
      { k: "Mi az önkiszolgálás speciális higiéniás kérdése?", v: "A látássérültek számára speciális higiéniás segédeszközök szükségesek (pl. jelölt eszközök) és a mosdás/fürdés tapintásos visszajelzéssel tanítandó." },
      { k: "Hogyan vegyük figyelembe a látássérülés fokát a fejlesztésben?", v: "Gyengénlátónál: kontrasztos, nagyított nyomtatás, jó megvilágítás. Alig látónál: auditív anyagok, tapintás. Vaknál: teljesen tapintásos és auditív csatornák." },
      { k: "Mi az inklúzió lehetőségei látássérültek esetén?", v: "Megfelelő adaptációkkal (akadálymentesítés, segédeszközök, kísérő pedagógus) az óvodai és iskolai integráció megvalósítható." },

      { k: "Milyen segédeszközök léteznek a modern technikában?", v: "Képernyőolvasó szoftverek (JAWS, NVDA), Braille-kijelző, audiokönyvek, okostelefon hangvezérléssel, nagyítók." },
      { k: "Mi a látás elvesztésének pszichés hatása?", v: "Szerzett vakság esetén gyász, tagadás, harag, depresszió normális reakciók. Pszichológiai támogatás és rehabilitáció szükséges." },
      { k: "Hogyan kommunikáljunk vak gyermekkel?", v: "Mindig szóval jelezzük be magunkat ('Én vagyok, Péter'), érintés előtt figyelmeztessük, leírjuk a környezetet szóban, nem 'mutogatunk' – mondunk." },

      { k: "Mik a hallássérülés főbb okai?", v: "Örökletes, intrauterin fertőzés (rubeola), szülési komplikáció, korai gyermekkori betegség (meningitis), gyógyszerek mellékhatása, zaj." },

      { k: "Milyen következménye van a prelingvális súlyos hallássérülésnek a nyelvfejlődésre?", v: "A hangzó nyelv elsajátítása rendkívül nehéz – a jelnyelv anyanyelv lehet, a hangzó nyelv másodfokú tanulás eredménye." },

      { k: "Mi a szájról olvasás?", v: "A halló személy szájmozgásának megfigyeléséből az ajaktechnikai jelek értelmezése. Önmagában nehéz és megbízhatatlan (sok hang azonosan látszik)." },
      { k: "Mi a hallókészülék?", v: "Elektronikus eszköz, amely felerősíti a hangokat. Nagyothallóknak segít, de süketeknél nem elegendő." },
      { k: "Mi a cochleáris implantátum?", v: "Beültetett elektronikus eszköz, amely közvetlenül a hallóideget stimulálja – lehetővé teszi a hangok percepciójátsuketeknek, különösen ha korán kerül beültetésre." },
      { k: "Hogyan hat a hallássérülés a személyiségfejlődésre?", v: "Elszigeteltség érzése, kommunikációs frusztráció, alacsonyabb önértékelés lehetséges hatások – de erős süket közösségi identitás is kialakulhat." },
      { k: "Mi a süket kultúra fogalma?", v: "A süketek saját közösséget, nyelvet (jelnyelv) és kultúrát alakítottak ki – a süketség nem betegség, hanem kulturális identitás." },
      { k: "Milyen gondozási feladatok jellemzők?", v: "Hallókészülék karbantartása, fülhigiénia, a halló környezettel való kommunikáció segítése, jelnyelv ismerete, vizuális figyelem fejlesztése." },

      { k: "Hogyan jelezzük be magunkat hallássérült gyermeknél?", v: "Vizuális jelzéssel (integetés, vállra érintés), ne hátulról szólítsuk meg, szemkontaktus biztosítása, jól megvilágított arcú kommunikáció." },
      { k: "Mi a bilinguális megközelítés a hallássérültek oktatásában?", v: "Jelnyelv és hangzó/írásos nyelv párhuzamos oktatása – a jelnyelv az anyanyelv, a hangzó nyelv az írásbeliség fejlesztését segíti." },
      { k: "Milyen nevelési formák léteznek hallássérültek számára?", v: "Speciális iskola (süketek/hallássérültek iskolája), integrált nevelés hallókkal, speciális osztály általános iskolában." },
      { k: "Mi a hangfeldolgozási zavar?", v: "A hallószerv anatómiailag ép, de az agy nem dolgozza fel megfelelően a hangokat – hasonló tüneteket okoz, mint a halláscsökkenés, de más kezelést igényel." },

      { f: "Süket kultúra", m: "A süketek közösségének saját értékei, identitása és büszkesége a jelnyelvre és a süket életmódra. Sokan nem betegségként, hanem identitásként élik meg." },
      { f: "Szájról olvasás", m: "A halló ember szájmozgásából próbáljuk kitalálni, mit mond. Nehéz és megbízhatatlan – sok hang azonos mozgással ejthető." },

      { k: "Mi a petyhüdt bénulás?", v: "A perifériás idegrendszer sérülése okozta bénulás – az izmok elvesztik tónusukat és sorvadhatnak (pl. gerincvelő-sérülés)." },
      { k: "Hogyan hat a mozgáskorlátozottság a személyiségfejlődésre?", v: "Veleszületett esetén: a sérülés az identitás részévé válik. Szerzett esetén: gyász, harag, depresszió normális reakciók. Mindkét esetben az elfogadás kulcsfontosságú." },

      { k: "Milyen gyógyászati segédeszközök léteznek?", v: "Tolókocsi (manuális, elektromos), járókeret, cipekedő, protézis, ortézis (rögzítő, korrekciós), ülőbetét, speciális matrac." },

      { k: "Mi az akadálymentesítés?", v: "A fizikai környezet átalakítása mozgáskorlátozottak számára: rámpák, lifteke, szélesebb ajtók, akadálymentes WC, speciális bútorok." },
      { k: "Mi a konduktív pedagógia (Pető-módszer)?", v: "A mozgáskorlátozottak komplex fejlesztési rendszere, amelyet Pető András fejlesztett ki. A mozgásfejlesztés és az oktatás integrálja egymást, a gyermek aktív részvételével." },
      { k: "Milyen gondozási sajátosságok jellemzők?", v: "Pozicionálás (megfelelő testhelyzet), nyomásfekélyek megelőzése, katéterezés, gyógyszeradagolás, fizikoterápia támogatása." },
      { k: "Mi a pozicionálás?", v: "A mozgáskorlátozott személy testének olyan helyzetbe hozása, amely megelőzi a decubitus (nyomásfekély) kialakulását és fenntartja a funkcionális testtartást." },
      { k: "Mit jelent az önállóság maximalizálása?", v: "Nem teszünk helyette olyat, amit ő is meg tud csinálni – csak a valóban szükséges segítséget adjuk meg. Az önállóság megőrzése a méltóság alapja." },
      { k: "Hogyan hat az iskolai sikertelenség a mozgáskorlátozott gyermekre?", v: "Ha a mozgáskorlátozott gyermeknek ép intelligenciája van, de a fizikai korlátok miatt nem tud teljesíteni, frusztrált, önértékelése romlik." },
      { k: "Mi az izomsorvadás (disztrófia)?", v: "Progresszív izombetegség, amely az izmok fokozatos gyengülésével és sorvadásával jár. Az állapot romlik – a fejlesztés a funkciók megőrzésére irányul." },
      { k: "Mi a komplex rehabilitáció elve?", v: "Orvosi (gyógyszerek, műtét) + gyógytornász + gyógypedagógus + szociális munkás + pszichológus – minden terület együttesen segít." },
      { k: "Hogyan segíthet az asszisztens a mozgáskorlátozottnak?", v: "Mozgásban segítség (tolókocsi kezelése, ültetés), öltöztetés/vetkőztetés, étkezési segítség, kommunikációs segítség, szükségletek azonnali jelzése." },
      { k: "Mi a mozgáskorlátozottság és az intellektus kapcsolata?", v: "A mozgáskorlátozottság nem jár szükségszerűen intellektuális érintettséggel. Pl. cerebrális parézisben lehet normál, sőt kiemelkedő intellektus is." },
    ],
    fogalmak: [
      { f: "Mozgáskorlátozottság", m: "A mozgásszervek sérülése vagy betegsége miatt valaki nem tud normálisan mozogni, önkiszolgálni. Ez lehet veleszületett vagy szerzett." },
      { f: "Agybénulás (cerebrális parézis)", m: "A fejlődő agyban bekövetkező, nem progresszív sérülés, amely mozgásproblémákat okoz. Okai lehetnek: szülési oxigénhiány, koraszülöttség." },
      { f: "Spaszticitás", m: "Az izmok fokozott merevsége, ami meggátolja a szabad mozgást. Agybénulás egyik tünete." },
      { f: "Protézis", m: "Mesterséges végtag vagy szerv – pl. műláb, műkar. Segíti a mindennapi funkciókat." },
      { f: "Akadálymentesítés", m: "Az épített környezet átalakítása – rámpák, lifteke, széles ajtók – hogy mindenki hozzáférhessen." },
      { f: "Pető-módszer", m: "Magyar fejlesztés (Pető András): mozgásfejlesztés és oktatás integrált rendszere. A gyerek aktív résztvevő, nem passzív beteg." },
      { f: "Pozicionálás", m: "A helyes testtartás biztosítása mozgáskorlátozottnál – megelőzi a sebeket és a fájdalmat, fenntartja a funkciókat." },
    ]
  },
  {
    id: 22,
    cim: "Beszédfogyatékosság",
    tetelSzoveg: "Ismertesse a beszédfogyatékosság fogalmát, okait, típusait, a beszédfogyatékosok nevelésének, oktatásának, gondozásának főbb jellemzőit, speciális eszközeit, valamint a logopédiai munka higiénés feladatait! Mutassa be a beszédfogyatékosság hatásait a személyiség fejlődésére!",
    kartya: [
      { k: "Mi a beszédfogyatékosság fogalma?", v: "A kommunikáció és a nyelvhasználat súlyos zavarainak összessége, amelyek a szokásos pedagógiai eszközökkel nem kezelhetők, speciális logopédiai segítséget igényelnek." },
      { k: "Mik a beszédfogyatékosság okai?", v: "Organikus (agysérülés, szájüreg rendellenesség, halláscsökkenés), funkcionális (pszichés, környezeti), kevert." },
      { k: "Melyek a beszédfogyatékosság főbb típusai?", v: "1. Beszédfejlődés elmaradása. 2. Hangzáshibák (pöszeség, orrhangzósság). 3. Hangképzési zavarok (dysfonia). 4. Folyamatosság zavarai (dadogás, hadarás). 5. Afázia. 6. Mutizmus." },
      { k: "Mi a dadogás?", v: "A beszéd folyamatosságának zavara – ismétlések, nyújtások, blokkok jellemzik. Stressz fokozza, nyugodt légkörben csökken." },
      { k: "Mi a hadarás?", v: "Túl gyors, ritmustalan, nehezen érthető beszéd – a gondolat 'megelőzi' az artikulációt. Sokszor nem tudatosul a hadaróban." },
      { k: "Mi az afázia?", v: "A már kialakult szóbeli és/vagy írásbeli nyelv elvesztése, agykárosodás következtében (pl. stroke). A logopédia segíthet a visszaszerzésben." },
      { k: "Mi a mutizmus?", v: "A kommunikációra való képtelenség pszichés okokból – organikus ok nélkül nem tud vagy nem akar szólalni. Pszichiátriai és logopédiai segítség szükséges." },
      { k: "Mi az integráció lehetőségei beszédfogyatékosok esetén?", v: "Enyhe esetben az általános iskolai integráció logopédiai megsegítéssel megvalósítható – súlyosabb esetben speciális intézmény indokolt." },
      { k: "Mi a logopédia?", v: "A beszéd- és kommunikációs zavarok prevenciójával, diagnosztizálásával és terápiájával foglalkozó tudományterület és szakma." },
      { k: "Milyen speciális eszközöket alkalmaz a logopédia?", v: "Tükör (artikuláció megfigyelése), hangolók, fúvókák, képkártyák, szoftverek, AAK-eszközök, dallamos intonáció terápia." },
      { k: "Milyen higiénés feladatok jellemzők a logopédiai munkában?", v: "Az eszközök (szívócsövek, spatulák, fúvókák) sterilizálása vagy egyszer használatos volta, kézhigiénia, nyálvédelem – a szájüreg érintésével járó munka higiénés protokollja." },
      { k: "Hogyan hat a dadogás a személyiségfejlődésre?", v: "Szégyen, szorongás, elkerülő magatartás, alacsony önértékelés – de megfelelő terápiával és elfogadással ezek csökkenthetők." },
      { k: "Hogyan segíthet az asszisztens dadogó gyermeknél?", v: "Türelmesen megvárjuk a mondanivalóját, nem fejezzük be helyette, nem siettetjük, fenntartjuk a szemkontaktust, nem reagálunk a dadogásra.'" },
      { k: "Mi a kommunikatív kompetencia fogalma?", v: "Nem csak helyes grammatika, hanem a megfelelő szociális helyzetben való hatékony kommunikáció képessége is – ezt is fejleszti a logopédia." },
      { k: "Mi a hangképzési zavar (dysfonia)?", v: "A hang minőségének, magasságának, erősségének zavara – rekedtség, hang elvesztése, kettős hang. Gége sérülése, funkcionális ok." },
      { k: "Mi a pöszeség?", v: "Hangok hibás képzése – pl. 's' hang helyett 'sz' ejt a gyerek, vagy 'r' helyett 'l'. Logopédiai terápiával korrigálható." },
      { k: "Mikor kezdjük a logopédiai fejlesztést?", v: "Minél korábban, annál hatékonyabb. Az idegrendszeri plaszticitás miatt korai fejlesztés a legeredményesebb." },
      { k: "Mi a gyermeknyelvfejlődés tipikus üteme és mikor kell logopédushoz fordulni?", v: "Ha 2 évesen nem mond szavakat, 3 évesen nem alkot mondatokat, 5 évesen nehezen értik, akkor logopédiai vizsgálat szükséges." },
      { k: "Hogyan hat a száj és fülüreg higiéniájának elhanyagolása?", v: "Fülgyulladások, fogínygyulladás – ezek tovább ronthatják a halló- és beszédfunkciókat." },
      { k: "Mi a hangos olvasás és a logopédiai munka kapcsolata?", v: "Az olvasástanulás megerősíti az artikulációs mozgásokat – a logopédus és a pedagógus összhangban dolgozik az olvasásfejlesztésben." },
    ],
    fogalmak: [
      { f: "Beszédfogyatékosság", m: "Súlyos kommunikációs zavar – nem csak 'csúnyán beszél', hanem a kommunikáció maga akadályozott. Logopédiai segítség szükséges." },
      { f: "Dadogás", m: "A folyamatos, gördülékeny beszéd zavara – ismételget, megakad, elnyújtja a szavakat. Stressz rontja, nyugodt légkör segít." },
      { f: "Hadarás", m: "Nagyon gyorsan és rendszertelenül beszél – az emberek nem értik. Sokszor nem is veszi észre magától." },
      { f: "Afázia", m: "Agysérülés (pl. stroke) után elveszett a már megtanult nyelv – nem tud szólni, vagy nem érti, amit mondanak neki." },
      { f: "Logopédia", m: "A beszéd- és kommunikációs zavarok kezelése – a logopédus speciális módszerekkel segíti vissza a normális kommunikációt." },
      { f: "Pöszeség", m: "Hangok hibás ejtése – pl. a gyerek 's' helyett 'sz'-t mond. Logopédiai fejlesztéssel korrigálható." },
    ]
  },
  {
    id: 23,
    cim: "Autizmus spektrumzavar",
    tetelSzoveg: "Mutassa be az autizmus spektrumzavar fogalmát, okait, kritériumait, nevelésük, oktatásuk főbb jellemzőit! Ismertesse az autizmus spektrumzavar pszichológiai hátterét, sajátosságait! Mutassa be a protetikus környezet fogalmát, eszközeit!",
    kartya: [
      { k: "Mi az autizmus spektrumzavar (ASZ)?", v: "A fejlődés átható neurológiai zavara, amely a szociális kommunikáció és interakció, valamint a rugalmas viselkedés és érdeklődés területein okoz jellemző nehézségeket." },
      { k: "Mi a fejlődési zavar (pervazív zavar) fogalma?", v: "Átható, az egész személyiséget érintő fejlődési zavar – nem egy-egy területet érint, hanem az összes pszichikus funkciót befolyásolja." },
      { k: "Mik az autizmus spektrumzavar diagnózis kritériumai?", v: "1. Tartós hiányosságok a szociális kommunikációban és interakcióban. 2. Korlátozott, repetitív viselkedés, érdeklődés és tevékenységek. Mindkettő szükséges." },
      { k: "Mik az ASZ szociális kommunikációs nehézségei?", v: "Szemkontaktus kerülése, nehézség az érzelmek értelmezésében, kölcsönös párbeszéd problémái, nonverbális kommunikáció zavara." },
      { k: "Mik a repetitív viselkedés formái ASZ-ben?", v: "Sztereotip mozgások (kézrázás, forgás), ritualisztikus szokások, ragaszkodás a változatlansághoz, speciális érdeklődési körök." },
      { k: "Mi a naiv tudatelmélet (Theory of Mind) hipotézise?", v: "Baron-Cohen: az autizmus spektrum zavarral élők nehézséget mutatnak mások elmeállapotainak (gondolatok, szándékok, érzések) megértésében." },
      { k: "Mi a végrehajtó működési zavar hipotézise?", v: "Az ASZ-ben jellemző merevség, ismétlő viselkedés a végrehajtó funkciók (tervezés, rugalmasság, impulzusszabályozás) zavarával magyarázható." },
      { k: "Mi a gyenge centrális koherencia hipotézise?", v: "Az autizmus spektrum zavarral élők részletekre koncentrálnak az egész rovására – nem látják az 'erdőt a fáktól', de apró részleteket észrevesznek." },
      { k: "Mi a protetikus környezet?", v: "Olyan, az ASZ-es személyre szabott fizikai és szervezeti környezet, amely kiszámítható, strukturált, és csökkenti az átalakodásból fakadó szorongást." },
      { k: "Mik a protetikus környezet eszközei?", v: "Képes napirend, tér strukturálása (sarok, rekeszek), idő vizuális megjelenítése (timer), tevékenységszervező kártyák, zajcsillapítás." },
      { k: "Mi a vizuális támogatottság?", v: "Képes, rajzos, szimbolikus formában teszi láthatóvá az elvárásokat, napirendet, szabályokat – az ASZ-es személyek inkább vizuálisan dolgozzák fel az információt." },
      { k: "Mi a PECS kommunikációs rendszer?", v: "Picture Exchange Communication System – képkártyák cseréjén alapuló kommunikációs rendszer nonverbális vagy keveset kommunikáló ASZ-es személyeknek." },
      { k: "Hogyan zajlik a tér strukturálása ASZ-nél?", v: "Különböző tevékenységekhez különböző fizikai helyek rendelése – 'ez az evés helye', 'ez a tanulás helye'. Ez csökkenti a bizonytalanságot." },
      { k: "Mi a képes napirend?", v: "Képek sorozata, amelyek mutatják, mi fog következni a nap folyamán. Az ASZ-es személy előre láthatja a napi rendet – ez csökkenti a szorongást." },
      { k: "Hogyan segíti a rutinok és rituálék fenntartása?", v: "Az ASZ-es személyek biztonságot találnak a kiszámítható rutinokban – változtatás intenzív szorongást okozhat. Előzetes felkészítés szükséges változáskor." },
      { k: "Mi az érzékszervi integráció zavarának szerepe?", v: "Sok ASZ-es személynek hipervag vagy hiposzenzitív érzékszervi feldolgozása van – pl. a hangok fájdalmasan erősek, vagy tapintásra érzéketlen." },
      { k: "Mi az ABA-terápia?", v: "Applied Behavior Analysis – viselkedéselemzésen alapuló intenzív fejlesztési módszer, amely megerősítéssel kívánt viselkedéseket tanít." },
      { k: "Milyen oktatási formák léteznek ASZ-nél?", v: "Speciális ASZ-iskola, integrált osztály autizmus-specifikus módszerekkel, egyéni fejlesztés – a szint és az igények alapján döntik el." },
      { k: "Mi az autizmus spektrumzavar és az intelligencia kapcsolata?", v: "Az ASZ minden intelligencia-szinten előfordulhat – magas intelligencia esetén is (Asperger), alacsony intelligencia esetén is. Az intelligencia és az ASZ független." },
      { k: "Hogyan kommunikáljunk ASZ-es gyermekkel?", v: "Egyértelműen, konkrétan, rövid mondatokban, vizuális kiegészítéssel, nem szó szerint értendő kifejezések kerülésével (irónia, metaforák), türelemmel." },
    ],
    fogalmak: [
      { f: "Autizmus spektrumzavar (ASZ)", m: "Fejlődési zavar, amely a szociális kommunikációban és a rugalmas viselkedésben okoz nehézségeket. 'Spektrum' – nagyon sokféle lehet, enyhe és súlyos is." },
      { f: "Naiv tudatelmélet (Theory of Mind)", m: "Az a képesség, hogy megértjük, mások is gondolkodnak, éreznek, és más dolgokat tudnak, mint mi. ASZ-nél ez nehezített – nehéz belátni mások fejébe." },
      { f: "Protetikus környezet", m: "Az ASZ-es személyre 'szabott' környezet – strukturált, kiszámítható, vizuálisan segített. Olyan, mint egy protézis: kompenzálja a hiányt." },
      { f: "Vizuális napirend", m: "Képsorozat, ami mutatja, mi fog következni a nap folyamán. Az ASZ-es gyerek így előre tudja, mi jön – és nem kell a bizonytalanságtól szorongani." },
      { f: "Repetitív viselkedés", m: "Ismétlődő mozgások, szokások, rituálék – pl. kézrázás, ugyanazon útvonal követése. Biztonságérzetet ad az ASZ-es személynek." },
      { f: "PECS", m: "Képkártyás kommunikációs rendszer – ha valaki nem tud vagy nem akar szóban kommunikálni, képekkel fejezi ki magát." },
      { f: "Gyenge centrális koherencia", m: "Az ASZ-ben jellemző, hogy az illető az egész helyett a részletekre figyel – pl. egy képből a háttér kis részletét veszi észre, nem a főszereplőt." },
    ]
  },
  {
    id: 24,
    cim: "Diszlexia, diszgráfia, diszkalkulia, Meixner-módszer",
    tetelSzoveg: "Ismertesse a diszlexia, diszgráfia, és a diszkalkulia fogalmakat, jellemezze tüneteiket, valamint nevelésük, oktatásuk főbb jellemzőit! Mutassa be a Meixner-módszer sajátosságait!",
    kartya: [
      { k: "Mi a diszlexia?", v: "Átlagos vagy átlag feletti intelligencia mellett fennálló, neurológiai alapú, specifikus olvasási nehézség – a betű-hang megfeleltetés, a szófelismerés és a szövegértés területén." },
      { k: "Mik a diszlexia tünetei?", v: "Lassú és pontatlan olvasás, betűcsere, kihagyás, beillesztés, szótagolás nehézsége, gyenge szövegértés, elmaradott helyesírás." },
      { k: "Mi a diszgráfia?", v: "Neurológiai alapú, specifikus írászavar – az írástechnika és az írásbeli kifejezés tartósan nehezített, a motoros koordináció és a fonetikai kódolás zavaraival." },
      { k: "Mik a diszgráfia tünetei?", v: "Olvashatatlan írás, betűk és számok tükrözése, szabálytalan betűméret, nagyon lassú írástempó, tollbal való nehéz bánás." },
      { k: "Mi a diszkalkulia?", v: "Neurológiai alapú, specifikus számolási és matematikai képességzavar – az aritmetikai alapműveletek, a számfogalom és a matematikai gondolkodás területén." },
      { k: "Mik a diszkalkulia tünetei?", v: "Számjegyek tükrözése, rossz helyi értékes kezelés, műveletek sorrendjének felcserélése, matematikai fogalmak értési nehézsége, szöveges feladatok megoldásának nehézsége." },
      { k: "Hogyan különböztethető meg a diszlexia a tanulási nehézségtől?", v: "Diszlexia: normális intelligencia ellenére fennálló specifikus olvasási zavar. Általános tanulási nehézség: több területen, intellektuális érintettséggel." },
      { k: "Mi a diszlexia neurológiai háttere?", v: "Foniológiai feldolgozás zavara, a bal agyfélteke olvasási régiójának eltérő működése, genetikailag meghatározott. Strukturális eltérések kimutathatók MRI-vel." },
      { k: "Mi a Meixner-módszer?", v: "Meixner Ildikó által kidolgozott olvasás-írástanítási módszer, amelyet kifejezetten diszlexiára hajlamos és diszlexiás gyerekeknek fejlesztett ki." },
      { k: "Mik a Meixner-módszer alapelvei?", v: "Hangonkénti tanítás, játékos-mesés keretezés, homogén gátlás csökkentése, fokozatosság, sok ismétlés, multiszenzoros feldolgozás." },
      { k: "Mi a homogén gátlás?", v: "Hasonló hangok (p-b, d-t, m-n) egymáshoz közeli tanítása zavart okoz (interferencia). Meixner-módszerben ezeket szándékosan eltávolítják egymástól." },
      { k: "Mi a diszlexia prevenció?", v: "Az óvodáskorban azonosítható kockázati tényezők korai logopédiai és fejlesztő beavatkozással csökkenthetők – mielőtt az olvasástanítás megkezdődik." },
      { k: "Mi a diszlexia reedukáció?", v: "A már kialakult olvasási zavar logopédiai terápiája – az olvasási mechanizmus újratanítása speciális módszerekkel." },

// ===================== STATE =====================
let currentTetelId = 1;
let currentTab = 'kartya';
let flippedCards = new Set();

// ===================== INIT =====================
function init() {
  // Populate sidebar
  const sidebarList = document.getElementById('sidebarList');
  tetelek.forEach(t => {
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (t.id === currentTetelId ? ' active' : '');
    item.innerHTML = `<span class="num">${t.id}.</span><span>${t.cim}</span>`;
    item.onclick = () => selectTetel(t.id);
    sidebarList.appendChild(item);
  });

  // Populate select
  const sel = document.getElementById('tetelSelect');
  tetelek.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = `${t.id}. ${t.cim}`;
    sel.appendChild(opt);
  });

  renderMain();
  updateStats();
}

function selectTetel(id) {
  currentTetelId = parseInt(id);
  document.getElementById('tetelSelect').value = id;
  document.querySelectorAll('.sidebar-item').forEach((item, idx) => {
    item.classList.toggle('active', tetelek[idx].id === currentTetelId);
  });
  flippedCards.clear();
  renderMain();
  updateStats();
}

function updateStats() {
  const tetel = tetelek.find(t => t.id === currentTetelId);
  const totalKartya = tetelek.reduce((s, t) => s + t.kartya.length, 0);
  const totalFogalom = tetelek.reduce((s, t) => s + t.fogalmak.length, 0);
  document.getElementById('statsBar').innerHTML = `
    Összes tétel: ${tetelek.length} &nbsp;|&nbsp; 
    Jelenlegi tétel kártyái: ${tetel ? tetel.kartya.length : '-'} &nbsp;|&nbsp; 
    Jelenlegi tétel fogalmai: ${tetel ? tetel.fogalmak.length : '-'} &nbsp;|&nbsp;
    Összes kártya: ${totalKartya} &nbsp;|&nbsp;
    Összes fogalom: ${totalFogalom}
  `;
}

function renderMain() {
  const tab = document.getElementById('nezet').value;
  const tetel = tetelek.find(t => t.id === currentTetelId);
  const main = document.getElementById('mainContent');

  if (!tetel) { main.innerHTML = '<div class="empty-state">Válassz tételt!</div>'; return; }

  let html = `
    <div class="topic-header">
      <h2>${tetel.id}. tétel – ${tetel.cim}</h2>
      <div class="tetel-szoveg">${tetel.tetelSzoveg}</div>
    </div>
    <div class="tabs">
      <button class="tab-btn ${tab === 'kartya' ? 'active' : ''}" onclick="switchTab('kartya')">📇 Tanulókártyák (${tetel.kartya.length})</button>
      <button class="tab-btn ${tab === 'fogalom' ? 'active' : ''}" onclick="switchTab('fogalom')">📖 Fogalomgyűjtemény (${tetel.fogalmak.length})</button>
      <button class="tab-btn ${tab === 'mindmap' ? 'active' : ''}" onclick="switchTab('mindmap')">🗺️ Mindmap</button>
    </div>
  `;

  if (tab === 'kartya') {    html += '<div class="cards-grid">';
    tetel.kartya.forEach((item, idx) => {
      const id = `card-${tetel.id}-${idx}`;
      const flipped = flippedCards.has(id) ? ' flipped' : '';
      html += `
        <div class="flashcard${flipped}" id="${id}" onclick="flipCard('${id}')">
          <div class="flashcard-inner">
            <div class="card-face card-front">
              <div class="card-num">❓ ${idx + 1}/${tetel.kartya.length}</div>
              <div class="card-question">${item.k}</div>
              <div class="card-hint">Kattints a válaszért</div>
            </div>
            <div class="card-face card-back">
              <div class="card-num">✅ ${idx + 1}/${tetel.kartya.length}</div>
              <div class="card-answer">${item.v}</div>
              <div class="card-hint">Kattints vissza</div>
            </div>
          </div>
        </div>
      `;
    });
    html += '</div>';
  } else {
    html += '<div class="fogalmak-grid">';
    tetel.fogalmak.forEach(item => {
      html += `
        <div class="fogalom-card">
          <div class="fogalom-term">${item.f}</div>
          <div class="fogalom-def">${item.m}</div>
        </div>
      `;
    });
    html += '</div>';
  } else if (tab === 'mindmap') {
    html += renderMindmap(tetel.id);
  }

  main.innerHTML = html;
}

function switchTab(tab) {
  document.getElementById('nezet').value = tab;
  renderMain();
}

// ===================== MINDMAP RENDERER =====================
function renderMindmap(tetelId) {
  const data = mindmapok[tetelId];
  if (!data) return '<div class="empty-state">Mindmap nem elérhető ehhez a tételhez.</div>';

  const W = 900, H = 620;
  const cx = W / 2, cy = H / 2;
  const branchCount = data.branches.length;
  const branchRadius = 190;
  const childRadius = 90;

  let svgLines = '';
  let svgNodes = '';

  // Center node
  svgNodes += `
    <ellipse cx="${cx}" cy="${cy}" rx="80" ry="44" fill="${data.color}" filter="url(#shadow)"/>
    <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="12" font-weight="bold" font-family="DM Sans, sans-serif">
      ${wrapText(data.center, 16)}
    </text>
  `;

  data.branches.forEach((branch, bi) => {
    const angle = (2 * Math.PI * bi / branchCount) - Math.PI / 2;
    const bx = cx + branchRadius * Math.cos(angle);
    const by = cy + branchRadius * Math.sin(angle);

    // Line from center to branch
    svgLines += `<line x1="${cx}" y1="${cy}" x2="${bx}" y2="${by}" stroke="${branch.color}" stroke-width="3" stroke-opacity="0.6"/>`;

    // Branch node
    const bLabel = branch.label;
    const bLines = splitLabel(bLabel, 14);
    const bH = Math.max(36, bLines.length * 16 + 12);
    const bW = 110;

    svgNodes += `
      <rect x="${bx - bW/2}" y="${by - bH/2}" width="${bW}" height="${bH}" rx="10" fill="${branch.color}" filter="url(#shadow)"/>
    `;
    bLines.forEach((line, li) => {
      const yOff = (li - (bLines.length - 1) / 2) * 16;
      svgNodes += `<text x="${bx}" y="${by + yOff}" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="10" font-weight="600" font-family="DM Sans, sans-serif">${line}</text>`;
    });

    // Children
    branch.children.forEach((child, ci) => {
      const childCount = branch.children.length;
      const spreadAngle = Math.min(Math.PI * 0.7, childCount * 0.35);
      const startAngle = angle - spreadAngle / 2;
      const childAngle = startAngle + (spreadAngle / Math.max(childCount - 1, 1)) * ci;
      const finalAngle = childCount === 1 ? angle : childAngle;
      const chx = bx + childRadius * Math.cos(finalAngle);
      const chy = by + childRadius * Math.sin(finalAngle);

      svgLines += `<line x1="${bx}" y1="${by}" x2="${chx}" y2="${chy}" stroke="${branch.color}" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="4,3"/>`;

      const cLines = splitLabel(child, 12);
      const cH = Math.max(28, cLines.length * 14 + 8);
      const cW = 95;

      svgNodes += `
        <rect x="${chx - cW/2}" y="${chy - cH/2}" width="${cW}" height="${cH}" rx="8" fill="${branch.color}" fill-opacity="0.18" stroke="${branch.color}" stroke-width="1.5"/>
      `;
      cLines.forEach((line, li) => {
        const yOff = (li - (cLines.length - 1) / 2) * 14;
        svgNodes += `<text x="${chx}" y="${chy + yOff}" text-anchor="middle" dominant-baseline="middle" fill="${branch.color}" font-size="9" font-weight="600" font-family="DM Sans, sans-serif">${line}</text>`;
      });
    });
  });

  const svg = `
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;min-height:480px;">
      <defs>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.18)"/>
        </filter>
      </defs>
      <rect width="${W}" height="${H}" fill="#fafaf7" rx="12"/>
      ${svgLines}
      ${svgNodes}
    </svg>
  `;

  // Legend
  let legend = '<div class="mm-legend">';
  data.branches.forEach(b => {
    legend += `<div class="mm-legend-item"><div class="mm-legend-dot" style="background:${b.color}"></div><span>${b.label}</span></div>`;
  });
  legend += '</div>';

  return `<div class="mindmap-wrap">${svg}</div>${legend}`;
}

function splitLabel(text, maxLen) {
  if (text.length <= maxLen) return [text];
  const words = text.split(' ');
  const lines = [];
  let current = '';
  words.forEach(word => {
    if ((current + ' ' + word).trim().length <= maxLen) {
      current = (current + ' ' + word).trim();
    } else {
      if (current) lines.push(current);
      current = word;
    }
  });
  if (current) lines.push(current);
  return lines.slice(0, 3);
}

function wrapText(text, maxLen) {
  const lines = splitLabel(text, maxLen);
  if (lines.length === 1) return `<tspan x="${450}" dy="0">${lines[0]}</tspan>`;
  return lines.map((l, i) => `<tspan x="450" dy="${i === 0 ? -(lines.length - 1) * 7 : 14}">${l}</tspan>`).join('');
}

function flipCard(id) {
  const card = document.getElementById(id);
  if (flippedCards.has(id)) {
    flippedCards.delete(id);
    card.classList.remove('flipped');
  } else {
    flippedCards.add(id);
    card.classList.add('flipped');
  }
}
