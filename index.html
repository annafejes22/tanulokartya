<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gyógypedagógiai Asszisztens – Tanulókártyák</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f5f0e8;
    --card-bg: #fffdf7;
    --accent: #2d6a4f;
    --accent2: #d4845a;
    --text: #1a1a2e;
    --text-light: #5a5a72;
    --border: #d8cfc0;
    --tag-bg: #e8f4f0;
    --tag-text: #2d6a4f;
    --flip-bg: #2d3a4a;
    --flip-text: #f5f0e8;
    --shadow: 0 4px 24px rgba(45,106,79,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--accent);
    color: #fff;
    padding: 2rem 2rem 1.5rem;
    text-align: center;
  }
  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 0.3rem;
  }
  header p { font-size: 0.95rem; opacity: 0.85; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.7rem;
    padding: 1.2rem 1.5rem;
    background: #fff;
    border-bottom: 1px solid var(--border);
    align-items: center;
    justify-content: center;
  }
  .controls select, .controls input {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    padding: 0.5rem 0.9rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
    color: var(--text);
    outline: none;
    cursor: pointer;
  }
  .controls select:focus, .controls input:focus {
    border-color: var(--accent);
  }
  .controls label { font-size: 0.88rem; color: var(--text-light); font-weight: 500; }

  .stats-bar {
    background: var(--tag-bg);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1.5rem;
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
    font-size: 0.85rem;
    color: var(--accent);
    font-weight: 600;
  }

  .layout {
    display: flex;
    min-height: calc(100vh - 200px);
  }

  .sidebar {
    width: 280px;
    min-width: 220px;
    background: #fff;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    max-height: calc(100vh - 200px);
    position: sticky;
    top: 0;
  }
  .sidebar h2 {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    padding: 1rem 1rem 0.5rem;
    color: var(--text-light);
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-size: 0.78rem;
  }
  .sidebar-item {
    padding: 0.65rem 1rem;
    cursor: pointer;
    border-bottom: 1px solid #f0ece4;
    font-size: 0.85rem;
    line-height: 1.4;
    transition: background 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .sidebar-item:hover { background: var(--tag-bg); }
  .sidebar-item.active { background: var(--accent); color: #fff; font-weight: 600; }
  .sidebar-item .num {
    font-size: 0.75rem;
    min-width: 22px;
    font-weight: 700;
    opacity: 0.7;
    margin-top: 1px;
  }

  .main {
    flex: 1;
    padding: 1.5rem;
    overflow-y: auto;
  }

  .topic-header {
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid var(--border);
  }
  .topic-header h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    color: var(--accent);
    margin-bottom: 0.3rem;
  }
  .topic-header .tetel-szoveg {
    font-size: 0.92rem;
    color: var(--text-light);
    font-style: italic;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    border-bottom: 2px solid var(--border);
  }
  .tab-btn {
    padding: 0.55rem 1.2rem;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--text-light);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    font-weight: 500;
    transition: color 0.15s;
  }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 700;
  }

  /* FLASHCARDS */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.2rem;
  }

  .flashcard {
    perspective: 1000px;
    height: 200px;
    cursor: pointer;
  }
  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.55s cubic-bezier(.4,2,.6,1);
    transform-style: preserve-3d;
  }
  .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 14px;
    padding: 1.2rem 1.3rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: var(--shadow);
    border: 1.5px solid var(--border);
  }
  .card-front {
    background: var(--card-bg);
  }
  .card-back {
    background: var(--flip-bg);
    color: var(--flip-text);
    transform: rotateY(180deg);
    border-color: transparent;
  }

  .card-num {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.7;
  }
  .card-back .card-num { color: rgba(245,240,232,0.5); }

  .card-question {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.45;
    flex: 1;
    display: flex;
    align-items: center;
    margin: 0.6rem 0;
  }
  .card-answer {
    font-size: 0.88rem;
    line-height: 1.55;
    flex: 1;
    display: flex;
    align-items: center;
    margin: 0.4rem 0;
    opacity: 0.92;
  }

  .card-hint {
    font-size: 0.72rem;
    color: var(--text-light);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .card-hint::before { content: '↕'; font-size: 0.9rem; }
  .card-back .card-hint { color: rgba(245,240,232,0.5); }
  .card-back .card-hint::before { content: '↕'; }

  /* FOGALOMGYŰJTEMÉNY */
  .fogalmak-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .fogalom-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.2rem;
    box-shadow: var(--shadow);
  }
  .fogalom-term {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .fogalom-def {
    font-size: 0.87rem;
    line-height: 1.6;
    color: var(--text);
  }
  .fogalom-def em {
    color: var(--accent2);
    font-style: normal;
    font-weight: 600;
  }

  /* MINDMAP */
  .mindmap-wrap {
    width: 100%;
    overflow-x: auto;
    overflow-y: auto;
    background: #fff;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
    padding: 1rem;
    min-height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mindmap-wrap svg {
    max-width: 100%;
    height: auto;
  }
  .mm-legend {
    margin-top: 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    justify-content: center;
  }
  .mm-legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--text-light);
  }
  .mm-legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* MOBILE */
  @media (max-width: 700px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; max-height: 200px; position: static; }
    .cards-grid { grid-template-columns: 1fr; }
    .fogalmak-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.4rem; }
  }

  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--text-light);
    font-size: 1rem;
  }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 1rem; }
  .progress-bar-bg {
    background: var(--border);
    border-radius: 8px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: var(--accent);
    height: 100%;
    border-radius: 8px;
    transition: width 0.4s;
  }
  .progress-label {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-bottom: 0.3rem;
  }
</style>
</head>
<body>

<header>
  <h1>🎓 Gyógypedagógiai Asszisztens</h1>
  <p>Képesítő vizsga – Szóbeli tételsor tanulókártyák &amp; fogalomgyűjtemény</p>
</header>

<div class="controls">
  <label>Tétel:</label>
  <select id="tetelSelect" onchange="selectTetel(this.value)">
    <option value="all">– Összes tétel –</option>
  </select>
  <label>Nézet:</label>
  <select id="nezet" onchange="renderMain()">
    <option value="kartya">Tanulókártyák</option>
    <option value="fogalom">Fogalomgyűjtemény</option>
  </select>
</div>

<div class="stats-bar" id="statsBar">
  Összes tétel: 26 &nbsp;|&nbsp; Kártyák: – &nbsp;|&nbsp; Fogalmak: –
</div>

<div class="layout">
  <nav class="sidebar">
    <h2>Tételek</h2>
    <div id="sidebarList"></div>
  </nav>
  <main class="main" id="mainContent"></main>
</div>

<script>
// ===================== ADATOK =====================

const tetelek = [
  {
    id: 1,
    cim: "Pedagógia fogalma, nevelés módszerei",
    tetelSzoveg: "Ismertesse a pedagógia fogalmát, célját, tárgyát, feladatát, sorolja fel a pedagógia területeit! Határozza meg a nevelés fogalmát, mutassa be a nevelés módszereit!",
    kartya: [
      { k: "Mi a pedagógia?", v: "A pedagógia kettős értelmű fogalom: egyrészt a nevelés tudománya (neveléstudomány), másrészt a nevelés gyakorlata. Vizsgálja a nevelés folyamatait, feltételeit és törvényszerűségeit." },
      { k: "Mi a pedagógia célja?", v: "A gyermek sokoldalú, harmonikus személyiségfejlesztése – testi, szellemi, erkölcsi és esztétikai területen egyaránt." },
      { k: "Mi a pedagógia tárgya?", v: "A nevelés – vagyis az a szándékos, tervszerű és intézményes folyamat, amelynek során a felnőtt generáció átadja tudását, értékeit és normáit a fiatalabb generációnak." },
      { k: "Milyen területei vannak a pedagógiának?", v: "Didaktika (oktatáselmélet), neveléselmélet, iskolapedagógia, gyógypedagógia, óvodapedagógia, felsőoktatás-pedagógia, összehasonlító pedagógia." },
      { k: "Mi a nevelés?", v: "A nevelés szándékos, céltudatos, tervszerű tevékenység, amellyel a pedagógus a tanuló személyiségét formálja – értékeket, normákat, viselkedési mintákat közvetít." },
      { k: "Mit értünk meggyőzés módszerén?", v: "A nevelő szóban, példával vagy bizonyítással hat a gyermek gondolkodására és érzelmeire, hogy helyes meggyőződés alakuljon ki benne (pl. magyarázat, elbeszélés, vita)." },
      { k: "Mit jelent a szoktatás nevelési módszere?", v: "Ismétléssel, gyakorlással kialakítjuk a kívánt szokásokat és magatartásformákat (pl. köszönés, rend, munkamegosztás)." },
      { k: "Mi a jutalmazás szerepe a nevelésben?", v: "Megerősíti a helyes viselkedést, növeli a motivációt. Lehet szóbeli dicséret, jegy, kitüntetés – de mindig arányosan a teljesítményhez." },
      { k: "Mikor alkalmazunk büntetést, és mire kell ügyelni?", v: "Büntetést akkor alkalmazzunk, ha a helytelen viselkedés más módszerrel sem változtatható meg. Soha ne legyen testi, megalázó – és mindig következetes, igazságos legyen." },
      { k: "Mi a nevelési módszer fogalma?", v: "A nevelési módszer azok az eljárások és eszközök összessége, amelyekkel a nevelő a kitűzött nevelési célt el kívánja érni." },
      { k: "Mi a különbség meggyőzés és kényszerítés között?", v: "A meggyőzés a belső megértésre épít, a gyermek maga fogadja el az értéket. A kényszerítés külső nyomás – tartós hatása kisebb, ezért kevésbé kívánatos." },
      { k: "Hogyan hat a személyes példamutatás a nevelésben?", v: "A pedagógus saját viselkedésével, hozzáállásával modellt nyújt. A gyermekek utánzással tanulnak, ezért a példa az egyik legerősebb nevelési eszköz." },
      { k: "Mi a követelés módszere?", v: "A nevelő egyértelmű, teljesíthető elvárásokat fogalmaz meg. Hatékony, ha következetes, érthető és életkornak megfelelő." },
      { k: "Mi a játék szerepe az óvodás korú gyermek nevelésében?", v: "Az óvodás kor vezető tevékenysége a játék. Ezen keresztül fejlődik a szociális készség, kreativitás, szabálykövető magatartás és a személyiség." },
      { k: "Milyen feladatai vannak a pedagógiának?", v: "1. Leírja a nevelési folyamatokat. 2. Feltárja törvényszerűségeiket. 3. Meghatározza a nevelés céljait és elveit. 4. Módszereket és eszközöket dolgoz ki." },
      { k: "Mi a didaktika?", v: "A pedagógia egyik ága, amely az oktatás elméletével és módszertanával foglalkozik – azaz azzal, hogyan tanítsunk hatékonyan." },
      { k: "Mit jelent a nevelés tervszerűsége?", v: "A nevelés nem véletlenszerű, hanem előre megtervezett célok, tartalmak és módszerek szerint zajlik." },
      { k: "Mi a különbség formális és informális nevelés között?", v: "A formális nevelés intézményes (iskola, óvoda). Az informális nevelés nem intézményes, életszerű helyzetekben zajlik (pl. családban, baráti körben)." },
      { k: "Hogyan kapcsolódik egymáshoz a nevelés és az oktatás?", v: "Az oktatás az ismeretek átadása, a nevelés a személyiség formálása. A kettő elválaszthatatlan: jó oktatás nevel is, és a nevelés oktat is." },
      { k: "Mi a nevelés hatékonyságát befolyásoló tényező?", v: "A nevelő személyisége, a módszerek következetessége, a nevelési légkör, a gyermek egyéni sajátosságai, a család és az iskola együttműködése." },
    ],
    fogalmak: [
      { f: "Pedagógia", m: "Olyan tudomány, ami azt vizsgálja, hogyan neveljük és tanítsuk a gyerekeket. Két dolog egyszerre: egy elmélet (mi a jó nevelés?) és egy gyakorlat (hogyan csináljuk?)." },
      { f: "Nevelés", m: "Amikor a felnőtt szándékosan próbál hatni a gyerekre – például értékeket, viselkedési szabályokat ad át. Nem véletlen, hanem tervezett folyamat." },
      { f: "Didaktika", m: "Az oktatás tudománya: azt vizsgálja, hogyan lehet a legjobban tanítani. Olyan, mint egy 'tanítás-kézikönyv'." },
      { f: "Meggyőzés", m: "Amikor nem parancsoljuk meg, hanem elmagyarázzuk, miért helyes valami. A gyerek maga jut arra a következtetésre, hogy ezt jó csinálni." },
      { f: "Szoktatás", m: "Ismételgetéssel, gyakorlással kialakítjuk a jó szokásokat – pl. mindig mosunk kezet evés előtt. Az ismétlés teszi automatikussá a viselkedést." },
      { f: "Jutalmazás", m: "Megerősítjük a jó viselkedést, hogy a gyerek tudja: ezt érdemes csinálni. Lehet egy dicséret, mosoly, vagy jó jegy." },
      { f: "Büntetés", m: "Jelzés arra, hogy valami nem volt helyes. Soha nem lehet bántó vagy megalázó – csak következetes és arányos." },
      { f: "Személyes példamutatás", m: "A pedagógus saját viselkedésével mutat mintát. Ha a felnőtt tisztelettudóan viselkedik, a gyerek is azt tanulja meg." },
    ]
  },
  {
    id: 2,
    cim: "Nevelés színterei – szocializáció",
    tetelSzoveg: "Mutassa be a nevelés színtereit! Jellemezze a család, az óvoda és az iskola szocializációban betöltött szerepét!",
    kartya: [
      { k: "Mi a szocializáció?", v: "Az a folyamat, amely során az egyén megtanulja a társadalom normáit, értékeit, szerepeit és viselkedési mintáit – és beilleszkedik a közösségbe." },
      { k: "Melyek a szocializáció főbb színterei?", v: "Család, óvoda, iskola, kortárscsoport, média, vallási közösség, munkahely." },
      { k: "Miért a legfontosabb szocializációs színtér a család?", v: "A gyermek első és legerősebb érzelmi kötődései itt alakulnak ki. A család adja az alapértékeket, szokásokat, kommunikációs mintákat – alapvetően meghatározza a személyiséget." },
      { k: "Hogyan befolyásolja a nevelési stílus a szocializációt?", v: "Demokratikus nevelés: önállóság + határok → egészséges szocializáció. Autoritárius: félelem, engedelmesség. Elhanyagoló: bizonytalanság, alacsony önértékelés." },
      { k: "Mi az óvoda szerepe a szocializációban?", v: "Az óvoda az első intézményes közösség. A gyerek megtanulja a szabálykövetést, csoportban való életet, szerepeket és az egyenrangú társakkal való együttműködést." },
      { k: "Milyen különbség van a家族 és az iskola nevelési funkciója között?", v: "A família érzelmi biztonságot, értékeket ad. Az iskola tudást, normákat, társadalmi szerepeket közvetít és értékeli a teljesítményt." },
      { k: "Mi a kortárs csoport szerepe?", v: "Serdülőkorban különösen fontos: a kortársak visszajelzései, normái erősen hatnak az identitás alakulására. A gyerek megtanulja az egyenrangú kapcsolatok kezelését." },
      { k: "Hogyan hat a média a szocializációra?", v: "A média értékeket, szerepmodelleket és viselkedési mintákat közvetít – pozitív és negatív irányban egyaránt. Kritikus médiafogyasztás nélkül befolyásolhatja az önképet." },
      { k: "Mi a társadalom és a család kapcsolata?", v: "A társadalmi változások (pl. válások száma, munkaerőpiac) hatnak a családra. A család értékei viszont visszahatnak a társadalomra – alapja az erkölcsi normák fenntartásának." },
      { k: "Hogyan örökíti át a familia az értékeket?", v: "Közvetlen tanítással, példamutatással, érzelmi légkörrel, szokásokkal, vallással és kulturális hagyományokkal." },
      { k: "Mi a szocializáció primer és szekunder szakasza?", v: "Primer: csecsemőkortól iskoláig főleg a família hatása érvényesül. Szekunder: iskolás kortól az intézmények és kortársak szerepe nő." },
      { k: "Mi a szerepátörökítés?", v: "A gyermek megfigyeli a szülők viselkedését és szerepeit (pl. anya–apa kapcsolat, munkához való viszony), és ezeket mintaként veszi át." },
      { k: "Miért fontos az iskola és a familia együttműködése?", v: "Ha az iskola és a familia értékei összhangban vannak, a nevelés hatékonysága sokszorosára nő. Ellentmondás esetén a gyerek bizonytalanná válik." },
      { k: "Mi a szociális tanulás?", v: "Bandura elmélete szerint a gyerekek megfigyeléssel, utánzással és megerősítéssel tanulnak társadalmi viselkedést – nem csak közvetlen tapasztalatból." },
      { k: "Hogyan segíti az óvoda az iskolaérettséget?", v: "Fejleszti a figyelmet, a szociális készségeket, az önkiszolgálást és a szabálykövető magatartást – ezek az iskolai tanulás alapjai." },
      { k: "Mi az iskola latens (rejtett) funkciója?", v: "Az iskola nemcsak tanít, hanem közvetetten normákat, hierarchiát, teljesítményorientációt és státuszokat is közvetít – anélkül, hogy ezt kimondaná." },
      { k: "Mi az értékek átörökítésének veszélye?", v: "Ha a família diszfunkcionális értékeket (pl. erőszak, előítélet) közvetít, a gyerek ezeket szintén elsajátítja. Ezért fontos a pedagógus korrekciós szerepe." },
      { k: "Hogyan befolyásolja a testvérpozíció a szocializációt?", v: "Az elsőszülött több felelősséget kap, a középső versenyez, a legkisebb elkényeztetett lehet. Ezek jellemformáló hatásúak, de nem determinálják a fejlődést." },
      { k: "Mi az inkluzív iskola szerepe a szocializációban?", v: "Az inkluzív iskola befogadja a különböző képességű gyerekeket. Mindenki megtanulja az elfogadást, az empátiát és a sokféleség értékét." },
      { k: "Mi a nevelési légkör hatása?", v: "Szeretetteljes, kiszámítható, következetes légkörben a gyerek biztonságban érzi magát, merészel próbálkozni és hibázni – ez a fejlődés alapja." },
    ],
    fogalmak: [
      { f: "Szocializáció", m: "Az a hosszú folyamat, amelynek során a gyerek megtanulja, hogyan viselkedjen a társadalomban. Olyan, mint egy 'társadalmi iskola', ami az egész életünkön át tart." },
      { f: "Primer szocializáció", m: "Az élet első éveiben a família hatása – ez a legerősebb, mert ekkor alakulnak ki az alapértékeink és érzelmi kötődéseink." },
      { f: "Szekunder szocializáció", m: "Iskolás kortól az intézmények (iskola, sportklub) és a barátok hatása – kiegészíti és sokszor módosítja azt, amit otthon tanultunk." },
      { f: "Szerepátörökítés", m: "Gyerekként megfigyelünk valakit (pl. apát), és észrevétlenül átvesszük a viselkedési mintáit – akár akarjuk, akár nem." },
      { f: "Normák", m: "Közös szabályok, amelyek meghatározzák, mi számít elfogadott viselkedésnek egy közösségben – pl. köszönés, sorbanállás, igazmondás." },
      { f: "Értékek", m: "Azok a dolgok, amelyeket egy közösség fontosnak tart – pl. becsület, munka, família, szolidaritás. Ezeket szocializáció útján sajátítjuk el." },
    ]

  {
    id: 3,
    cim: "Oktatás fogalma, tanítás-tanulás folyamata",
    tetelSzoveg: "Ismertesse az oktatás fogalmát, célját, valamint a tanítás-tanulás folyamatát!",
    kartya: [
      { k: "Mi az oktatás?", v: "Az oktatás tudatos, tervszerű, intézményes folyamat, amelynek során a pedagógus ismereteket, készségeket és képességeket közvetít a tanulóknak." },
      { k: "Mi az oktatás célja?", v: "Tudás átadása, képességek fejlesztése, személyiség alakítása és a társadalomba való beilleszkedés elősegítése." },
      { k: "Mi a tanítás-tanulás folyamata?", v: "A tanár és a tanuló közötti kölcsönös, kétirányú folyamat: a tanár szervezi, irányítja a tanulást; a tanuló aktívan feldolgozza az új ismereteket." },
      { k: "Melyek az oktatási folyamat fázisai?", v: "1. Motiválás. 2. Célkitűzés. 3. Az új anyag feldolgozása. 4. Rögzítés, megszilárdítás. 5. Alkalmazás. 6. Értékelés, ellenőrzés." },
      { k: "Mi az oktatási folyamat szakaszai?", v: "Érzékelés → megértés → elvonatkoztatás → alkalmazás. Ez Herbárt klasszikus fokozatrendszerének modern változata." },
      { k: "Mi a motiváció szerepe az oktatásban?", v: "A motiváció belső erő, ami hajtja a tanulót. Belső motiváció (érdeklődés) erősebb, tartósabb, mint a külső (jó jegy, jutalmazás)." },
      { k: "Mit jelent az aktív tanulás?", v: "A tanuló nem passzívan befogad, hanem maga fedezi fel az összefüggéseket, kérdez, alkot, kipróbál. Mélyebb és tartósabb tudást eredményez." },
      { k: "Mi a tananyag logikai sorrendjének jelentősége?", v: "Az ismeretek egymásra épülnek. Az új anyag csak akkor érthető, ha az előző már megszilárdult – ezért fontos a spirálisszerű haladás." },
      { k: "Miért fontos a visszacsatolás az oktatásban?", v: "Visszacsatolás nélkül sem a tanár, sem a tanuló nem tudja, merre jár. Az ellenőrzés segít azonosítani a hiányosságokat és korrigálni azokat." },
      { k: "Mi a különbség tudás és készség között?", v: "A tudás elméleti ismeret (pl. mi a fotoszintézis?). A készség begyakorolt, automatikus cselekvés (pl. olvasás, kerékpározás)." },
      { k: "Mi a képesség fogalma?", v: "Azok a személyiségvonások, amelyek lehetővé teszik a feladatok eredményes elvégzését (pl. logikus gondolkodás, kreativitás, empátia)." },
      { k: "Hogyan épül fel egy jó tanítási óra?", v: "Ráhangolódás – előző anyag ismétlése – motiválás – új anyag – megértés ellenőrzése – rögzítés – házi feladat." },
      { k: "Mi a differenciálás az oktatásban?", v: "A tanár figyelembe veszi a tanulók eltérő tempóját, stílusát, előismereteit, és ehhez igazítja a feladatokat és módszereit." },
      { k: "Mi az egyéni fejlesztési terv célja?", v: "SNI-s vagy más sajátos igényű tanulóknál az egyéni fejlesztési terv pontosan meghatározza a fejlesztési célokat, módszereket és a haladás ütemét." },
      { k: "Mi a Vygotsky-féle legközelebbi fejlődési zóna?", v: "Az a terület, ahol a gyerek még nem tud önállóan teljesíteni, de felnőtt vagy okosabb társ segítségével igen. Erre épít a hatékony oktatás." },
      { k: "Mi a formáló és összegző értékelés különbsége?", v: "Formáló értékelés: menet közben, a fejlődést segíti. Összegző értékelés: a végén, lezárja a folyamatot (pl. vizsga, jegy)." },
      { k: "Mi a kooperatív tanulás?", v: "A tanulók kiscsoportokban dolgoznak együtt közös célért. Fejleszti a szociális készségeket, kommunikációt és a felelősségérzetet." },
      { k: "Milyen tanulási stílusok léteznek?", v: "Vizuális (látás), auditív (hallás), kinesztetikus (cselekvés). Hatékony oktatás többféle csatornán éri el a tanulót." },
      { k: "Mi a túlterhelés jele és hogyan előzhető meg?", v: "Jele: fáradtság, figyelmetlenség, csökkenő teljesítmény. Megelőzés: arányos feladatmennyiség, szünetek, változatos módszerek." },
      { k: "Mi az oktatás és nevelés egységének elve?", v: "Az oktatás soha nem értéksemleges: minden tanítási tartalom egyben értékeket, normákat is közvetít. Oktatás és nevelés elválaszthatatlan." },
    ],
    fogalmak: [
      { f: "Oktatás", m: "Tervezett folyamat, amelynek során a tanár átadja tudását a diáknak, és segít neki készségeket fejleszteni. Nem csak információátadás, hanem fejlesztés is." },
      { f: "Tanulás", m: "Amikor valami tartósan megváltozik abban, amit tudunk vagy hogyan csinálunk valamit. A tapasztalat, a gyakorlás és a felfedezés eredménye." },
      { f: "Motiváció", m: "Az a belső hajtóerő, ami miatt csinálni akarjuk azt, amit csinálunk. Belső motiváció: azért tanulok, mert érdekel. Külső: azért, mert jó jegyet kapok." },
      { f: "Differenciálás", m: "Mindenki más. A differenciálás azt jelenti, hogy a tanár nem egyforma feladatot ad mindenkinek, hanem figyel arra, ki mit bír és mi illik hozzá." },
      { f: "Visszacsatolás", m: "Visszajelzés. Pl. a tanár kijavítja a dolgozatot – ezzel tudja meg a diák, mi volt jó és mi nem. Visszacsatolás nélkül nincs fejlődés." },
      { f: "Legközelebbi fejlődési zóna", m: "Vygotsky elmélete: van, amit a gyerek önállóan meg tud csinálni, és van, amit csak segítséggel. Ez utóbbi a 'fejlődési zóna' – ide kell a tanárnak belépnie." },
    ]
  },
  {
    id: 4,
    cim: "Oktatás módszerei, szervezeti és munkaformái",
    tetelSzoveg: "Mutassa be az oktatás módszereit és az oktatási módszer kiválasztásának szempontjait! Jellemezze az oktatás szervezeti és munkaformáit!",
    kartya: [
      { k: "Mi az oktatási módszer?", v: "Az oktatási módszer az a tudatos eljárás, amellyel a pedagógus és a tanuló közösen eléri a kitűzött oktatási célokat." },
      { k: "Milyen oktatási módszerek léteznek?", v: "Magyarázat, szemléltetés, gyakorlás, megbeszélés, vita, projekt, felfedező tanulás, kooperatív módszerek, szimuláció, előadás." },
      { k: "Mi a frontális munka?", v: "Az egész osztálynak egyszerre, azonos tempóban tart a pedagógus óra. Hatékony az ismeretek gyors átadásában, de nem veszi figyelembe az egyéni különbségeket." },
      { k: "Mi az egyéni munka előnye és hátránya?", v: "Előny: önállóságra nevel, differenciálható. Hátrány: elszigeteli a tanulót, nem fejleszt szociális készséget." },
      { k: "Mi a párban végzett munka lényege?", v: "Két tanuló együtt old meg feladatot. Fejleszti a kommunikációt, az együttműködést és a kölcsönös segítséget." },
      { k: "Mi a csoportmunka előnye?", v: "Fejleszti a szociális készségeket, munkamegosztást, felelősségérzetet és a konfliktusmegoldást. Kooperatív tanulást valósít meg." },
      { k: "Mikor válasszunk frontális módszert?", v: "Ha sok információt kell gyorsan átadni, ha az osztály szintje homogén, vagy ha bevezetünk egy teljesen új témát." },
      { k: "Mi a kooperatív tanulás alapelve?", v: "Pozitív egymásrautaltság + egyéni felelősség + közvetlen interakció + szociális készségek fejlesztése. Mindenki felelős a csoport sikeréért." },
      { k: "Mik az oktatási módszer megválasztásának szempontjai?", v: "A tanulók életkora, a tananyag jellege, a rendelkezésre álló idő és eszközök, a csoport összetétele, a didaktikai cél." },
      { k: "Mi a szemléltetés módszere?", v: "Képek, tárgyak, modellek, filmek, kísérletek bemutatásával tesszük érzékletessé az ismeretet. 'Egy kép ezer szót ér.'" },
      { k: "Mi a megbeszélés mint módszer?", v: "Irányított párbeszéd tanár és tanulók között. A tanár kérdésekkel vezeti a gondolkodást, a tanulók aktívan részt vesznek." },
      { k: "Mi a projekt módszer?", v: "A tanulók egy valódi, komplex problémát oldanak meg önállóan vagy csoportban. Fejleszti a kreativitást, tervezést és a valóságos problémamegoldást." },
      { k: "Mi az oktatás szervezeti kerete?", v: "Az oktatás szervezeti kerete a tanítási óra – de léteznek más keretek is: kirándulás, szakkör, tanulmányi séta, projekt hét." },
      { k: "Melyek a tanítási óra típusai?", v: "Új ismeretet feldolgozó óra, gyakorló óra, ismétlő-rendszerező óra, ellenőrző óra, vegyes típusú óra." },
      { k: "Mi a házi feladat szerepe?", v: "Az ismeretek megszilárdítása és a tanórák közötti kapcsolat biztosítása. Fejleszti az önállóságot – de mértékkel, hogy ne okozzon túlterhelést." },
      { k: "Hogyan kapcsolódik a módszer a tartalomhoz?", v: "Nem minden módszer illik minden tartalomhoz. Pl. kísérlet jó természettudományhoz, vita jó erkölcsi kérdésekhez – a módszert a tartalomhoz kell igazítani." },
      { k: "Mi a tanulási szerződés?", v: "Tanár és tanuló megállapodása a teljesítendő feladatokról és elvárásokról. Fejleszti az önállóságot és a felelősségvállalást." },
      { k: "Mi a szimuláció módszere?", v: "Valóságos szituációkat imitálnak tanítási céllal – pl. szerepjáték, szituációs gyakorlat. Különösen hasznos a gyógypedagógiai asszisztensi munkában." },
      { k: "Mik az oktatás munkaformái összefoglalva?", v: "Frontális, egyéni, páros, csoportos munka – ezek kombinálhatók, és a hatékony pedagógus többfélét is alkalmaz egy órán belül." },
      { k: "Mi a heurisztikus módszer?", v: "A tanár kérdéseivel rávezeti a tanulót az önálló felfedezésre. A tanuló maga jut el a következtetésre – ez mélyebb megértést eredményez." },
    ],
    fogalmak: [
      { f: "Oktatási módszer", m: "Az az eljárás, ahogyan a tanár tanít. Nem mindegy, hogyan – más módszerrel más dolgokat lehet jól megtanítani." },
      { f: "Frontális munka", m: "Az egész osztálynak egyszerre tart órát a tanár. Gyors és hatékony, de nem minden gyereknek ugyanolyan ütemben megy." },
      { f: "Kooperatív tanulás", m: "Kis csoportokban dolgoznak a diákok közös célért. Mindenki felelős, és egymástól is tanulnak – nem csak a tanártól." },
      { f: "Differenciált oktatás", m: "A tanár különböző feladatokat ad a különböző szintű tanulóknak – így mindenki a saját szintjén fejlődhet." },
      { f: "Szemléltetés", m: "Képeket, tárgyakat, filmeket mutatunk, hogy az ismeretet ne csak hallani, hanem látni is lehessen. Könnyebb megérteni, amit látunk is." },
      { f: "Projekt módszer", m: "A diákok egy nagyobb, valós problémát oldanak meg – pl. terveznek egy kiállítást. Önállóság és kreativitás kell hozzá." },
    ]

  {
    id: 5,
    cim: "Sajátos nevelési igény, inklúzió, integráció, szegregáció",
    tetelSzoveg: "Ismertesse a sajátos nevelési igény fogalmát, területeit! Értelmezze az inklúzió, integráció, szegregáció fogalmakat! Mutassa be a gyógypedagógiai segítő munkatárs SNI-s gyermekkel, tanulóval kapcsolatos feladatait!",
    kartya: [
      { k: "Mi a sajátos nevelési igény (SNI) fogalma?", v: "Az SNI olyan állapot, amelynek következtében a gyermek szokásosnál nagyobb mértékű és speciálisabb nevelési, oktatási, fejlesztési ellátást igényel." },
      { k: "Milyen SNI-kategóriák léteznek?", v: "1. Érzékszervi fogyatékosság (látás, hallás). 2. Értelmi akadályozottság. 3. Mozgáskorlátozottság. 4. Autizmus spektrum zavar. 5. Egyéb pszichés fejlődési zavar (diszlexia, ADHD stb.)." },
      { k: "Mi a különleges bánásmód fogalma?", v: "A különleges bánásmód azokat a tanulókat foglalja magában, akik sajátos nevelési igényük, kiemelkedő tehetségük vagy beilleszkedési nehézségeik miatt egyéni bánásmódot igényelnek." },
      { k: "Mi a BTMN fogalma?", v: "Beilleszkedési, Tanulási és Magatartási Nehézség – olyan állapot, amely nem fogyatékosság, de speciális pedagógiai segítséget igényel." },
      { k: "Mi az integráció a közoktatásban?", v: "Az SNI-s tanulókat a nem SNI-s tanulókkal közös, általános iskolai vagy óvodai csoportban nevelik. A tanulók fizikailag egy helyen vannak, de a módszerek lehetnek eltérők." },
      { k: "Mi az inklúzió?", v: "Az integráción túlmutató szemlélet: nemcsak fizikailag, hanem tartalmilag is befogadja a közösség az SNI-s tanulót. Mindenki egyenrangú tagja a közösségnek." },
      { k: "Mi a szegregáció?", v: "Az SNI-s tanulókat külön, speciális intézményben nevelik. Önmagában nem értékítélet – súlyos fogyatékosság esetén szükséges lehet." },
      { k: "Mi a különbség integráció és inklúzió között?", v: "Integráció: a gyerek 'belekerül' a csoportba, de a rendszer nem változik köré. Inklúzió: a rendszer alakul a gyerek szükségleteihez." },
      { k: "Milyen feladatai vannak a gyógypedagógiai segítő munkatársnak SNI-s gyermekkel?", v: "Egyéni segítségnyújtás az órákon, higiénés szokások támogatása, önkiszolgálás fejlesztése, együttműködés a gyógypedagógussal, a família és más szakemberekkel." },
      { k: "Mi az egyéni fejlesztési terv?", v: "Az SNI-s tanuló számára készített személyre szabott terv, amely meghatározza a fejlesztési célokat, módszereket, az értékelés módját és a fejlesztés ütemét." },
      { k: "Ki dönt az SNI megállapításáról?", v: "A Szakértői Bizottság (EGYMI – Egységes Gyógypedagógiai Módszertani Intézmény) állapítja meg az SNI-t és tesz javaslatot az ellátásra." },
      { k: "Hol dolgozhat a gyógypedagógiai asszisztens?", v: "Bölcsődében, integrált óvodában, iskolában, speciális óvodában, iskolában, gyermekotthonban, felnőtt fogyatékosok intézményeiben." },
      { k: "Mit jelent az adaptáció az SNI-s tanuló oktatásában?", v: "A tananyag, módszerek, eszközök és értékelés módosítása a tanuló szükségleteihez – pl. hosszabb feladatmegoldási idő, segédeszközök használata." },
      { k: "Mi az SNI-s gyermek jogai?", v: "Joga van az ingyenes különleges ellátáshoz, speciális szakemberek segítségéhez, az egyéni fejlesztési tervhez és a szükséges segédeszközökhöz." },
      { k: "Milyen segédeszközök segíthetik az SNI-s tanulót?", v: "Halláskészülék, Braille-írógép, kommunikációs tábla, speciális számítógép, különleges íróeszközök, mozgásos segédeszközök." },
      { k: "Mi a gyógypedagógiai asszisztens és a gyógypedagógus kapcsolata?", v: "Az asszisztens a gyógypedagógus irányítása alatt dolgozik. Önállóan nem hozhat szakmai döntéseket – a gyógypedagógus tervez, az asszisztens megvalósítja." },
      { k: "Mi a kompetenciahatár fogalma?", v: "A gyógypedagógiai asszisztens nem lép túl saját hatáskörén: nem diagnosztizál, nem ír fejlesztési tervet, nem dönt szakmai kérdésekben önállóan." },
      { k: "Hogyan kommunikál az asszisztens az SNI-s gyermekkel?", v: "Türelmesen, egyértelműen, rövid mondatokban, sok visszajelzéssel. Az érzelmi biztonság és a bizalom alapvető." },
      { k: "Mit jelent az autizmus barát környezet?", v: "Kiszámítható, strukturált, vizuálisan támogatott, zajszegény, előre jelezhető – csökkenti az autizmus spektrum zavarral élő gyermek szorongását." },
      { k: "Milyen elvek mentén dolgozik a gyógypedagógiai asszisztens?", v: "Empátia, türelem, következetesség, diszkréció, a gyermek méltóságának tisztelete, szakmai alázat és az önálló döntések kerülése." },
    ],
    fogalmak: [

      { f: "BTMN", m: "Beilleszkedési, Tanulási és Magatartási Nehézség. Nem fogyatékosság, de a gyereknek segítség kell – pl. nehezen ül csendben, nehezen olvas, vagy nem tud jól beilleszkedni." },

      { f: "Szegregáció", m: "Az SNI-s gyerekek külön intézménybe járnak. Nem baj ez – súlyosabb esetekben valóban a legjobb megoldás lehet, mert ott speciálisan képzett szakemberek dolgoznak." },

  {

    kartya: [
      { k: "Mi a pszichológia fogalma?", v: "A pszichológia a lelki jelenségek (viselkedés, gondolkodás, érzelmek, motivációk) tudományos vizsgálatával foglalkozó diszciplína." },
      { k: "Mi a pszichológia tárgya?", v: "Az emberi pszichikum: gondolkodás, érzelem, akarat, motiváció, figyelem, észlelés, személyiség és viselkedés." },

      { k: "Hol helyezkedik el a pszichológia a tudományok rendszerében?", v: "A természettudományok (biológia, neurológia) és a társadalomtudományok (szociológia, pedagógia) határán – mindkettővel szorosan kapcsolódik." },
      { k: "Mi a megfigyelés mint kutatási módszer?", v: "A kutató természetes körülmények között figyeli meg a viselkedést, anélkül hogy beavatkozna. Célja: leírni, ami valóban történik." },

      { k: "Mi az interjú módszere?", v: "Személyes kérdezéses módszer, amellyel mélyebb, egyedi információkat gyűjtenek. Lehet strukturált vagy kötetlen." },
      { k: "Mi a kérdőív módszer előnye és hátránya?", v: "Előny: sok emberről gyors adat gyűjthető. Hátrány: felszínes lehet, a válaszok szubjektívek, nem mutat mögöttes okokat." },
      { k: "Mi az esetleírás (kazuisztika)?", v: "Egyetlen személy részletes vizsgálata. Mély megértést ad, de nem általánosítható – Freud esetei klasszikus példák." },
      { k: "Mi a pszichológiai teszt?", v: "Standardizált feladatsor, amely egy pszichés jellemzőt mér (pl. intelligencia, szorongás, személyiségtípus)." },
      { k: "Mi az introspekció módszere?", v: "Önmegfigyelés – a személy saját belső állapotait, gondolatait figyeli meg és írja le. Korlátja: szubjektív, könnyen torzult." },
      { k: "Hogyan kapcsolódik a pszichológia a pedagógiához?", v: "A neveléspszichológia azt vizsgálja, hogyan tanul és fejlődik a gyermek, mi motiválja, és hogyan kezelhetők a nevelési problémák." },
      { k: "Hogyan kapcsolódik a pszichológia a gyógypedagógiához?", v: "A gyógypedagógiai pszichológia az akadályozott fejlődésű személyek lelki jellemzőit vizsgálja – segít megérteni viselkedésüket és szükségleteiket." },
      { k: "Mi a longitudinális kutatás?", v: "Ugyanazon személyeket éveken át követik nyomon – így a fejlődési folyamatok időbeli alakulása is megfigyelhető." },
      { k: "Mi a keresztmetszeti vizsgálat?", v: "Különböző életkorú embereket vizsgálnak egy időpontban – gyors, de nem mutatja az egyéni fejlődési utat." },
      { k: "Mi a pszichológia feladatai?", v: "1. Leírni a lelki jelenségeket. 2. Megmagyarázni őket. 3. Megjósolni a viselkedést. 4. Segíteni a változásban (terápia, fejlesztés)." },
      { k: "Mi az etika szerepe a pszichológiai kutatásban?", v: "A vizsgált személyek beleegyezése szükséges, nem szabad ártani, az adatokat bizalmasan kell kezelni." },
      { k: "Mi a kognitív pszichológia?", v: "A gondolkodás, memória, figyelem és problémamegoldás tudományos vizsgálata. Kulcskérdése: hogyan dolgozzuk fel az információt?" },
      { k: "Mi a behaviorista pszichológia?", v: "Csak a megfigyelhető viselkedéssel foglalkozik (Pavlov, Watson, Skinner). Alapja: inger–válasz kapcsolatok és megerősítés." },
      { k: "Mi a humanisztikus pszichológia?", v: "Maslow, Rogers nevéhez köthető. Az ember alapvetően jó, és önmegvalósításra törekszik. Középpontban az egyén szabad akarata és méltósága." },
    ],
    fogalmak: [
      { f: "Pszichológia", m: "A lélek tudománya. Azt vizsgálja, hogyan gondolkodunk, érzünk, miért csináljuk, amit csinálunk. Tudományos módszerekkel kutatja a lelki jelenségeket." },
      { f: "Megfigyelés", m: "Megnézzük, mi történik – beavatkozás nélkül. Olyan, mintha egy természetfilm rendezőjeként figyelnénk az embereket." },
      { f: "Kísérlet", m: "Változtatunk valamit, és megnézzük, mi lesz a hatása. Így derítjük ki az ok-okozati összefüggéseket." },
      { f: "Pszichológiai teszt", m: "Standardizált feladatsor, amivel mérhetünk valamit – pl. mennyire szorongós valaki, vagy mekkora az IQ-ja." },

      { f: "Kognitív pszichológia", m: "Azt vizsgálja, hogyan gondolkodunk, emlékezünk, figyelünk. Az agy olyan, mint egy számítógép – hogyan dolgozza fel az információt?" },

  {
    id: 7,
    cim: "Személyiség fogalma, fejlődése",
    tetelSzoveg: "Határozza meg a személyiség fogalmát, valamint a személyiség fejlődését befolyásoló tényezőket! Mutassa be az öröklött tulajdonságok, környezeti hatások személyiségfejlődésben betöltött szerepét!",
    kartya: [
      { k: "Mi a személyiség fogalma?", v: "A személyiség az egyén pszichikus sajátosságainak (tulajdonságok, képességek, attitűdök, értékek) viszonylag állandó, egyedi rendszere, amely meghatározza gondolkodását, érzéseit és viselkedését." },
      { k: "Melyek a személyiség fejlődését befolyásoló főbb tényezők?", v: "1. Öröklés (genetika). 2. Környezet (família, iskola, kultúra). 3. Kölcsönhatásuk (interakció). 4. Az egyén saját aktivitása." },
      { k: "Mit jelent a biológiai determinizmus?", v: "Az öröklés (gének) döntik el, hogy ki lesz valaki. Pl. temperamentum, intelligencia alapjai genetikusan meghatározottak." },
      { k: "Mit jelent a környezeti determinizmus?", v: "A személyiséget kizárólag a környezet, a tapasztalatok és a nevelés formálja. Behaviorizmus képviseli ezt az álláspontot." },
      { k: "Mi a konvergencia elmélet?", v: "Galton elmélete szerint az öröklés és a környezet egymástól függetlenül hat a személyiségre, és ezek 'összeadódnak'." },
      { k: "Mi a modern interakcionista felfogás?", v: "Az öröklés és a környezet nem egyszerűen összeadódnak, hanem kölcsönösen hatnak egymásra – a gének hatása függ a környezettől, és fordítva." },
      { k: "Mi a temperamentum?", v: "Az egyén viszonylag állandó, veleszületett emocionális és reakciómintázata – pl. mennyire élénk, visszahúzódó, ingerlékeny." },
      { k: "Mi a karakter?", v: "A személyiség tanult, nevelt összetevője – az erkölcsi értékek, jellemvonások, amelyek a nevelés és tapasztalat során alakulnak ki." },
      { k: "Hogyan befolyásolja a família a személyiséget?", v: "A korai familia-hatás a legerősebb: érzelmi kötődés, nevelési stílus, familia légköre alapvetően meghatározzák az önértékelést, bizalmat és értékeket." },
      { k: "Mi a Maslow-féle szükséglethierarchia és személyiség kapcsolata?", v: "A személyiség fejlődéséhez biztonságos, kielégített alapszükségletek kellenek (étel, biztonság, szeretet, megbecsülés) – csak ekkor érhető el az önmegvalósítás." },
      { k: "Mi az önértékelés szerepe a személyiségfejlődésben?", v: "Az egészséges önértékelés alapja a pozitív élményeknek, a szeretetnek és az elvárásoknak. Alacsony önértékelés gátolja a fejlődést." },
      { k: "Hogyan hat az iskola a személyiségre?", v: "Az iskola értékeli a teljesítményt, kialakítja a szociális szerepeket és normarendszert. Pozitív élmény építi, negatív rombolja az önképet." },
      { k: "Mi a genetikai örökség szerepe az intelligenciában?", v: "Az intelligencia mintegy 50-80%-ban genetikailag meghatározott, de a környezeti feltételek (iskolázás, inger-gazdag környezet) erősen befolyásolják kibontakozását." },
      { k: "Mi a kritikus periódus fogalma?", v: "Fejlődés során vannak időablakkok, amelyekben egy-egy készség vagy tulajdonság különösen könnyen kialakul (pl. anyanyelv elsajátítása, kötődés)." },
      { k: "Mi az Erikson-féle fejlődéselmélet lényege?", v: "Az ember egész életén át fejlődik, és minden életszakaszban egy-egy fejlődési krízissel néz szembe – ezek megoldása egészséges személyiséget eredményez." },
      { k: "Mi a Freud-féle személyiségstruktúra?", v: "Id (ösztönök), Ego (reális én), Szuperego (erkölcsi ítéletek). A személyiség e három összetevő egyensúlyától függ." },
      { k: "Mi a szocializáció és a személyiség viszonya?", v: "Szocializáció által vesszük át a kulturális normákat és értékeket – ezek részévé válnak személyiségünknek." },
      { k: "Mi a reziliencia?", v: "Lelki rugalmasság – a képesség, hogy nehézségek, traumák után is talpra álljunk és fejlődjünk. Erős kötődés és pozitív énkép segíti." },
      { k: "Hogyan hat a testvér-sorrend a személyiségre?", v: "Elsőszülött: felelősségteljes, vezető típus. Középső: rugalmas, konfliktuskerülő. Legkisebb: kreatív, könnyed – de ezek nem determinisztikusak." },
      { k: "Mi a szelf (én) fogalma?", v: "Az önmagunkról alkotott kép és tapasztalat – önazonosság, énkép. Rogers szerint az egészséges személyiség kulcsa a pozitív énkép." },
    ],
    fogalmak: [
      { f: "Személyiség", m: "Az a különleges és egyedi 'csomag', ami mindenkit azzá tesz, aki. Beleértve a gondolkodást, érzelmeket, szokásokat, értékeket és viselkedési mintákat." },
      { f: "Temperamentum", m: "Velünk született jellemvonás – pl. mennyire vagyunk élénkek, visszahúzódók, vagy türelmesek. Részben a génjeink adják." },
      { f: "Karakter", m: "A nevelés és tapasztalat által alakuló jellemvonásaink – pl. becsületesség, szorgalom, empátia." },
      { f: "Biológiai determinizmus", m: "Az a nézet, hogy a génjeid döntenek arról, ki leszel. Ez egy szélső álláspont – a valóság összetettebb." },
      { f: "Konvergencia elmélet", m: "Az öröklés és a környezet mindketten hatnak – összeadódnak a hatásaik. Mint két folyó, amely összefolyik." },
      { f: "Reziliencia", m: "Lelki rugalmasság. Képes vagy-e talpra állni, ha valami nehéz történik? Erős kötődések és önbizalom segítik." },
      { f: "Önértékelés", m: "Mennyire tartod magadat értékesnek. Ha magas, bátran próbálkozol. Ha alacsony, félsz megpróbálni valamit." },

  {
    id: 8,
    cim: "Érés, tanulás, nevelés kölcsönhatása, szükségletek",

    kartya: [
      { k: "Mi az érés fogalma?", v: "Az érés genetikailag programozott, belső fejlődési folyamat – az idegrendszer, az érzékszervek és a motorikus rendszer biológiai megérése. Nem igényel tanulást." },
      { k: "Mi a tanulás fogalma pszichológiai értelemben?", v: "A tanulás tartós változás a tudásban, viselkedésben vagy képességekben, amelyet tapasztalat, gyakorlás vagy megfigyelés okoz." },
      { k: "Hogyan hat az érés a tanulásra?", v: "Csak érés után lehet hatékonyan tanulni egy készséget. Pl. az olvasástanítást csak iskolaérettség után szabad elkezdeni – korábban hiábavaló." },
      { k: "Mi a tanulás fajtái?", v: "Klasszikus kondicionálás, operáns kondicionálás, szociális (megfigyeléses) tanulás, fogalmi/belátásos tanulás, memorizálás." },
      { k: "Mi a klasszikus kondicionálás?", v: "Pavlov kísérlete: egy semleges inger (csöngetés) összekapcsolódik egy fontos ingerrel (étel), és önmagában is reakciót vált ki." },
      { k: "Mi az operáns kondicionálás?", v: "Skinner elmélete: a megerősített viselkedés erősödik, a büntetett gyengül. Jutalom és büntetés formálja a viselkedést." },
      { k: "Mi a szociális tanulás?", v: "Bandura elmélete: megfigyeléssel, utánzással tanulunk. A modell hatása erős – ha a gyerek erőszakos viselkedést lát, azt tanulhatja." },
      { k: "Hogyan hat a nevelés az érésre?", v: "Bár az érést nem siettethetjük, a kedvező környezet és nevelés elősegíti az érési folyamatok teljes kibontakozását." },
      { k: "Mi Maslow szükséglethierarchiájának alapja?", v: "Az alapszükségletek (étel, biztonság) kielégítése szükséges a magasabb rendű szükségletek (szeretet, elismerés, önmegvalósítás) eléréséhez." },
      { k: "Melyek Maslow szükségletei alulról felfelé?", v: "1. Fiziológiai szükségletek. 2. Biztonság. 3. Valahova tartozás, szeretet. 4. Megbecsülés, elismerés. 5. Önmegvalósítás." },
      { k: "Mi a motívum fogalma?", v: "A motívum belső hajtóerő, amely cselekvésre indít és irányítja a viselkedést egy cél felé." },
      { k: "Mi a különbség primer és szekunder szükséglet között?", v: "Primer: biológiai alapszükségletek (éhség, szomjúság, alvás). Szekunder: tanult szükségletek (elismerés, kapcsolatok, teljesítmény)." },
      { k: "Mi a belső motiváció?", v: "A tevékenységet önmagáért végezzük – érdeklődés, kíváncsiság, örömszerzés motivál. Tartósabb és erősebb, mint a külső motiváció." },
      { k: "Mi a külső motiváció?", v: "Jutalom, büntetés, társadalmi nyomás motivál. Rövid távon hatékony, de megszüntetésekor a viselkedés is elmarad." },
      { k: "Mi az optimális fejlődés feltétele Maslow szerint?", v: "Az összes alapszükséglet kielégítettsége – ha valami hiányzik (pl. biztonság, szeretet), az önmegvalósítás nem érhető el." },
      { k: "Hogyan befolyásolja a biztonság hiánya a tanulást?", v: "Ha a gyermek nem érzi magát biztonságban (pl. erőszak, elhanyagolás), energiáit a túlélésre fordítja, és nem képes hatékonyan tanulni." },
      { k: "Mi az iskolaérettség és hogyan kapcsolódik az éréshez?", v: "Az iskolaérettség az idegrendszer és a pszichikus funkciók (figyelem, önszabályozás) megfelelő érettségét jelenti – ez érés eredménye." },
      { k: "Mi az emlékezet típusai?", v: "Rövid távú (munkamemória) és hosszú távú (szemantikus, epizodikus, procedurális) emlékezet." },
      { k: "Mi az elfeledés, és miért következik be?", v: "Az elfeledés természetes folyamat. Oka: ritkán előhívott emlékek halványulnak. Megelőzés: ismétlés, összefüggések, értelmes tanulás." },
      { k: "Mi a belátásos tanulás?", v: "Hirtelen 'ráébredés' egy összefüggésre – nem fokozatos, hanem ugrásszerű megértés. Köthler majomkísérletei igazolták." },
    ],
    fogalmak: [
      { f: "Érés", m: "Belülről jövő fejlődési folyamat – a génjeink 'programjának' lefutása. Nem tanulás eredménye, hanem biológiai fejlődés." },
      { f: "Tanulás", m: "Tartós változás a tudásban vagy viselkedésben, amelyet tapasztalat okoz. Szélesebb, mint az iskolai tanulás – pl. kerékpározni tanulni is tanulás." },
      { f: "Klasszikus kondicionálás", m: "Pavlov kísérlete: a kutya megtanulta, hogy a csöngetés ételt jelent – ezért nyáladzott csöngés hallatán is. Inger–válasz társítás." },
      { f: "Operáns kondicionálás", m: "Skinner egerének jutalmazás-büntetés tanulása. Ha jót csinálsz és jutalmat kapsz, többet csinálod. Ha büntetést, kevesebbet." },
      { f: "Szociális tanulás", m: "Bandura: mások megfigyelésével tanulunk. Látod, hogy valaki megdicsérnek valamiért – te is megpróbálod." },
      { f: "Maslow-féle szükséglethierarchia", m: "Maslow elmélete: az ember szükségletei sorrendben következnek egymásra. Előbb enni kell, aztán biztonság kell, aztán szeretet stb. – mindegyik az előzőre épül." },
      { f: "Motívum", m: "Belső hajtóerő, ami cselekvésre késztet. Miért csinálsz valamit? Mert szereted, mert félsz a büntetéstől, vagy mert valakinek meg akarsz felelni." },

    kartya: [
      { k: "Mi a fejlődéslélektan?", v: "A pszichológia ága, amely az ember pszichológiai fejlődését vizsgálja a fogantatástól az öregkorig – az érzelmi, kognitív, szociális és személyiségbeli változásokat." },
      { k: "Melyek a fejlődéslélektan jellemzői?", v: "Longitudinális szemléletű, a változásokat és azok törvényszerűségeit vizsgálja, figyelembe veszi a biológiai és környezeti tényezők kölcsönhatását." },
      { k: "Mi a kötődés fogalma?", v: "A kötődés a csecsemő és gondozója között kialakuló erős, tartós érzelmi kötelék, amely alapul szolgál a biztonságérzethez és a later kapcsolatokhoz." },
      { k: "Ki dolgozta ki a kötődéselmélet alapjait?", v: "John Bowlby brit pszichiáter az 1950-60-as években – evolúciós megközelítésű elméletet dolgozott ki a kötődés biológiai funkciójáról." },
      { k: "Mi az Ainsworth-féle 'Idegen helyzet' kísérlet?", v: "Mary Ainsworth vizsgálta, hogyan reagál a csecsemő az anya távozásakor és visszatérésekor – így azonosította a biztonságos és bizonytalan kötődési stílusokat." },
      { k: "Milyen kötődési stílusok léteznek?", v: "1. Biztonságos kötődés: a gyerek bátran felfedez, mert biztos az anya visszatérésében. 2. Elkerülő: kevéssé reagál. 3. Szorongó-ambivalens: nagyon fél az anya hiányától. 4. Dezorganizált: nincs egységes stratégiája." },
      { k: "Mi a biztonságos kötődés hosszú távú hatása?", v: "Biztonságos kötődés esetén a felnőtt is képes egészséges kapcsolatokat kialakítani, jobban birkózik meg stresszel, magasabb az önértékelése." },
      { k: "Mi a Harlow-kísérlet?", v: "Harlow majomkísérleteiben a kölyök a 'drótmama' helyett a puha anyagból készült 'textilmamához' ragaszkodott – ez bizonyítja, hogy a kötődés nem csak táplálkozáson, hanem testi közelségen alapul." },
      { k: "Mi a Spitz-féle hospitalizáció fogalma?", v: "Spitz megfigyelése: az intézetben felnövő, anyai gondoskodástól megfosztott csecsemők súlyos fejlődési visszamaradást (anaclitikus depresszió) szenvednek, sőt meghalhatnak." },
      { k: "Mi az apa-gyermek kapcsolat fejlődési szerepe?", v: "Az apa más stílusú kötődést nyújt – több fizikai játékot, kihívást, kalandot. Ez segíti az önállóság fejlődését és az énhatárok kialakulását." },
      { k: "Mi a 'critical period' (érzékeny időszak) a kötődésben?", v: "Az első 6-12 hónap különösen fontos a kötődés kialakulásához. Ha ekkor nem alakul ki stabil kapcsolat, a fejlődés tartósan sérülhet." },
      { k: "Mi az Erikson-féle bizalom vs. bizalmatlanság krízis?", v: "Az élet első évének fejlődési feladata: ha a gondozó megbízható és következetes, az alapbizalom kialakul – ez a kötődés alapja." },
      { k: "Hogyan befolyásolja a kötődési stílus a felnőttkori kapcsolatokat?", v: "A korai kötődési minta 'belső munkamodelként' él tovább – meghatározza, hogy felnőttként hogyan közelítünk a romantikus és baráti kapcsolatokhoz." },
      { k: "Mi a szeparációs szorongás?", v: "A kb. 8-12 hónapos csecsemő sírással, tiltakozással reagál az anya távozására – ez a kötődés normális jelzése, nem betegség." },
      { k: "Mi az anyai depriváció?", v: "Az anyai gondoskodás tartós hiánya – ennek következménye lehet kognitív visszamaradás, érzelmi elsivárosodás, szociális nehézségek." },
      { k: "Mi a 'Strange Situation' kísérlet menete?", v: "Anya és gyerek idegennel találkoznak, anya elmegy, idegen marad, anya visszatér – a gyerek reakciói alapján mérik a kötődési stílust." },
      { k: "Mi a skin-to-skin (bőr-bőr érintkezés) jelentősége?", v: "Újszülöttnél az azonnali bőr-bőr kontaktus elősegíti a kötődés kialakulását, stabilizálja a hőmérsékletet és csökkenti a stresszhormonokat." },
      { k: "Hogyan segíthet a gyógypedagógiai asszisztens a kötődés erősítésében?", v: "SNI-s gyermeknél is alapvető a következetes, meleg, kiszámítható bánásmód. Az asszisztens pótló kötődési figurává válhat intézményi nevelésben." },
      { k: "Mi a rezidens kötődés?", v: "A csecsemő nemcsak az anyához, hanem más állandó gondozókhoz (apa, nagyszülők) is kötődik – a több stabil kötődési kapcsolat védelmet nyújt." },
      { k: "Miért fontos a kötődés a gyógypedagógiai munkában?", v: "Kötődési nehézség sokszor áll a magatartásproblémák, tanulási nehézségek és szociális zavarok mögött – a segítő munkában ezt figyelembe kell venni." },
    ],
    fogalmak: [
      { f: "Fejlődéslélektan", m: "Az a tudományág, ami azt vizsgálja, hogyan változunk és fejlődünk a születéstől az öregkorig – érzelmileg, gondolkodásban és kapcsolatainkban." },
      { f: "Kötődés", m: "Az a különleges érzelmi kapcsolat, ami a babák és gondozóik között alakul ki. Olyan, mint egy 'lelki köldökzsinór' – alapja az egész életünk kapcsolatainak." },
      { f: "Biztonságos kötődés", m: "Ha a mama (vagy gondozó) mindig ott van, amikor kell – a baba megtanulja, hogy a világ biztonságos hely, és bátran felfedez." },
      { f: "Harlow-kísérlet", m: "Kísérlet majmokkal: a kölyök nem az élelemnyújtó drótmamát választotta, hanem a puha textilmamát – a kötődés alapja az érintés és a melegség, nem az étel." },
      { f: "Hospitalizáció (Spitz)", m: "Ha egy csecsemő sokáig nem kap anyai gondoskodást (pl. intézetben él), súlyosan visszamarad a fejlődésben – ezt nevezte Spitz hospitalizációnak." },
      { f: "Szeparációs szorongás", m: "Amikor a kisbaba sír, mert elment az anyja. Ez normális, kb. 8-12 hónaposan kezdődik – azt jelenti, hogy kötődés alakult ki." },
    ]

  {
    id: 10,
    cim: "Életkori sajátosságok – újszülött, csecsemő, kisgyermekkor",
    tetelSzoveg: "Jellemezze az életkori sajátosságokat az egyes életkori szakaszokban! Mutassa be az újszülöttkor, a csecsemőkor és a kisgyermekkor testi, érési, érzelmi és viselkedési jellemzőit!",
    kartya: [
      { k: "Mik a fejlődés törvényszerűségei?", v: "1. Folytonos (nincs ugrás). 2. Egyenlőtlen (nem minden terület egyszerre fejlődik). 3. Individuális (mindenki más tempóban). 4. Egyirányú (visszalépés ritka)." },
      { k: "Mit jellemez az újszülöttkor?", v: "Az első 4 hét az újszülöttkor. Jellemzői: alkalmazkodás az extrauterin élethez, reflexek (szopás, kapaszkodás), alvás dominanciája, alapvető érzékelés." },
      { k: "Mik az újszülötti reflexek?", v: "Szopóreflex, Moro-reflex (ijedési), fogóreflex (tenyér érintésére), lépőreflex, keresőreflex – ezek veleszületett, automatikus reakciók." },
      { k: "Mi jellemzi a csecsemőkort?", v: "Az 1. életév. Gyors testi növekedés, motoros fejlődés (fejemelés → fordulás → ülés → állás → járás), kötődés kialakulása, első kommunikációs jelzések." },
      { k: "Mi a kisgyermekkor?", v: "1-3 éves kor. Önállóság megjelenése, járás tökéletesedése, anyanyelv elsajátítása, szimbolikus játék megjelenése, 'én' tudat kialakulása." },
      { k: "Mi az anyanyelv-elsajátítás menete?", v: "Gügyögés → gagyogás → első szavak (kb. 12 hó) → szókincs robbanás (18-24 hó) → kétszavas mondatok → összefüggő beszéd 3 éves korra." },
      { k: "Mi a 'dackorszak' és mikor jelenik meg?", v: "2-3 éves kor táján jelenik meg. A gyermek saját akaratát fejezi ki ('én csinálom!'). Az 'én' tudat megerősödésének jele – egészséges fejlődés." },
      { k: "Milyen testi fejlődés jellemzi a csecsemőkort?", v: "Születéskor kb. 50 cm, 3 kg. 1 éves korra háromszoros súly (9 kg), kétszeres hossz. Az első év a legrohamosabb növekedési periódus." },
      { k: "Mi a szimbolikus játék?", v: "2 éves kor körül megjelenő játékforma: a gyermek egy tárgyat másik tárgy helyett használ (pl. banán = telefon). Jelzi a szimbolikus gondolkodás kialakulását." },
      { k: "Hogyan fejlődik az érzékelés az újszülöttkorban?", v: "Az újszülött lát (30 cm-re élesen), hall, érez ízeket, szagokat. Az arcot már korán preferálja – evolúciós kötődési mechanizmus." },
      { k: "Mi a motoros fejlődés sorrendje az első életévben?", v: "Fejemelés (1-2 hó) → fordulás (3-4 hó) → ülés (6 hó) → mászás (8 hó) → állás (10 hó) → önálló járás (12-15 hó)." },
      { k: "Mi jellemzi a csecsemő érzelmi fejlődését?", v: "Alapérzelmek (öröm, félelem, düh) korán megjelennek. Szociális mosoly 6 hétre. Idegenektől való félelem 6-8 hónapra. Szeparációs szorongás 8-12 hóra." },
      { k: "Mi a tárgyállandóság fogalma?", v: "Piaget: kb. 9 hónaposan alakul ki az a tudás, hogy a tárgyak léteznek, ha nem látjuk őket. Előtte: 'ami nincs, az nincs'." },
      { k: "Hogyan fejlődik a figyelem a kisgyermekkorban?", v: "Kezdetben rövid, szelektív. 2-3 éves korra egyre hosszabb ideig képes koncentrálni – de még mindig a konkrét, érzékelhető ingerekre." },
      { k: "Mi a preoperatív gondolkodás?", v: "Piaget szerint 2-7 éves kor között a gyermek szimbolikusan gondolkodik, de nem tud még logikusan következtetni – egocentrikus, mágikus gondolkodás jellemzi." },
      { k: "Mi az egocentrizmus kisgyermekkorban?", v: "A kisgyermek úgy érzi, mindenki úgy látja a világot, ahogy ő – nem tud még más nézőpontból gondolkodni. Ez nem önzőség, hanem fejlődési jellemző." },
      { k: "Miért fontos a mozgásfejlődés?", v: "A mozgásfejlődés nemcsak motoros, hanem kognitív és érzelmi fejlődést is jelez. Mozgással fedezi fel a gyerek a világot és önmagát." },
      { k: "Mi az alvás szerepe a csecsemőkorban?", v: "A csecsemő napját az alvás uralja (16-20 h/nap). Alvás alatt konszolidálódnak a megtanult dolgok és fejlődik az idegrendszer." },
      { k: "Milyen érzelmi szükségletek vannak kisgyermekkorban?", v: "Biztonság, szeretet, kiszámíthatóság, határok, elismerés, mozgáslehetőség és felfedezési tér. Ezek nélkül a fejlődés megreked." },
      { k: "Mi a figyelem és gondozás jelzéseinek felismerése?", v: "A csecsemő sírással, gagyogással, arckifejezéssel és mozgással jelzi szükségleteit. A gondozó érzékeny reagálása alapja a biztonságos kötődésnek." },
    ],
    fogalmak: [
      { f: "Újszülöttkor", m: "Az első 4 hét az életben. A baba még a has utáni élethez alkalmazkodik – alszik sokat, eszik, és veleszületett reflexekkel reagál a világra." },
      { f: "Csecsemőkor", m: "Az első életév. Rohamosan fejlődik minden: a baba megtanul forogni, ülni, majd járni – és kialakul az első kötődés." },
      { f: "Kisgyermekkor", m: "1-3 éves kor. A gyerek megtanul járni, beszélni, és kezd önálló akarni lenni – ebből lesz a 'dackorszak'." },
      { f: "Dackorszak", m: "2-3 éves korban a gyerek elkezdi kifejezni saját akaratát: 'Nem!', 'Én csinálom!'. Ez nem rossz dolog – az önállóság fejlődésének jele." },
      { f: "Szimbolikus játék", m: "Amikor a gyerek úgy tesz, mintha – pl. egy botot telefonnak használ. Jelzi, hogy már szimbolikusan tud gondolkodni." },
      { f: "Tárgyállandóság", m: "Amikor a gyerek rájön (kb. 9 hónaposan), hogy a tárgy létezik akkor is, ha nem látja. Előtte: ha eltakarsz valamit, 'eltűnt'." },
    ]

  {
    id: 11,
    cim: "Életkori sajátosságok – óvodáskor, kisiskoláskor, serdülőkor",
    tetelSzoveg: "Jellemezze az életkori sajátosságokat az egyes életkori szakaszokban! Mutassa be az óvodáskor, a kisiskoláskor és a serdülőkor testi, érési, érzelmi és viselkedési jellemzőit!",
    kartya: [
      { k: "Mi jellemzi az óvodáskort (3-6 év)?", v: "Vezető tevékenység a játék. Intenzív mozgásfejlődés, fantázia virágkora, szociális kapcsolatok bővülése, szabálytudat kialakulása, kíváncsiság." },
      { k: "Mi az iskolaérettség?", v: "Az idegrendszeri, mozgásos, szociális és pszichikus érettség szintje, amely lehetővé teszi az iskolai követelmények teljesítését. Feltétele a sikeres iskolakezdésnek." },
      { k: "Mik az iskolaérettség kritériumai?", v: "Figyelemkoncentráció, önszabályozás, szociális érettség, fine motorika (ceruza), lelkiismeretes munkaattitűd, alap szókincs és számfogalom." },
      { k: "Mi jellemzi a kisiskoláskor (6-10 év)?", v: "Konkrét műveleti gondolkodás (Piaget), logikus következtetés konkrét tárgyakra, szorgalom vs. kisebbrendűség krízis (Erikson), kortársak fontossága nő." },
      { k: "Mi a konkrét műveleti gondolkodás?", v: "Piaget szerint 7-11 éves korban a gyerek logikusan gondolkodik, de csak konkrét, szemléletes esetekre – elvont következtetés még nem megy." },
      { k: "Mi a megőrzés fogalma Piaget-nél?", v: "A gyerek megtanulja, hogy az anyagmennyiség nem változik meg, ha az alakja változik (pl. hosszú vékony pohár ugyanannyi vizet tartalmaz, mint az alacsony széles)." },
      { k: "Mi jellemzi a serdülőkort (10-18 év)?", v: "Pubertás (nemi érés), identitáskeresés, kortárscsoport dominanciája, érzelmi hullámzás, absztrakt gondolkodás megjelenése, önállóság igénye." },
      { k: "Mi a pubertás?", v: "A nemi érés folyamata – testi változások (növekedési spurt, nemi szervek fejlődése, másodlagos nemi jellegek megjelenése) serdülőkorban." },
      { k: "Mi az identitáskeresés Erikson szerint?", v: "A serdülőkor fejlődési krízise: 'Ki vagyok én?' A fiatal különböző szerepeket próbál ki, mielőtt stabil identitást alakít ki." },
      { k: "Mi a formális műveleti gondolkodás?", v: "Piaget szerint kb. 12 éves kortól a gyerek elvontan is tud gondolkodni – feltételezéseket vizsgál, logikailag következtet elméletekre." },
      { k: "Milyen testi változások jellemzik a serdülőkort?", v: "Lányoknál: mellnövekedés, menstruáció, csípő kiszélesedés. Fiúknál: hangmélyülés, szőrnövekedés, pénisz fejlődése, spermatozoid termelés. Mindkettőnél: akné, verejtékmirigy aktiválódás." },
      { k: "Miért fontos a kortárscsoport serdülőkorban?", v: "A familia hatása csökken, a kortárscsoport veszi át a fő szocializációs szerepet. Azonos értékek, megértés, identitástámasz – de nyomást is jelent." },
      { k: "Mi az érzelmi labilitás a serdülőkorban?", v: "Gyors hangulatingadozások hormonális változások miatt – pillanatokkal ezelőtt vidám volt, most sír. Ez normális, de következetes határok szükségesek." },
      { k: "Mi az egocentrizmus serdülőkorban?", v: "Imaginárius közönség: 'Mindenki rám figyel.' Személyes fábula: 'Velem ez nem történhet meg.' Újfajta egocentrizmus, de más, mint kisgyermekkorban." },
      { k: "Hogyan változik az erkölcsi fejlődés serdülőkorban?", v: "Kohlberg szerint a serdülők a posztkonvencionális szint felé mozdulnak – elveket, igazságot, elvont erkölcsi értékeket kezdenek mérlegelni." },
      { k: "Mi a rizikomagatartás és miért jellemző serdülőkorban?", v: "Kísérletezés tiltott anyagokkal, veszélyes szituációk keresése – az idegrendszer éretlen impulzusszabályozása és az autonómiavágy együttesen okozzák." },
      { k: "Mi a lázadás szerepe serdülőkorban?", v: "Az önállóság kivívásának szükségszerű eszköze. Nem patológia, hanem fejlődési igény – de határok és következetesség szükségesek." },
      { k: "Hogyan segíthet a pedagógus serdülőkorban?", v: "Tiszteletteljes, dialogikus kapcsolat, határok következetes tartása, autonómia fokozatos biztosítása, empátia a hangulatingadozások során." },
      { k: "Mi az iskolai teljesítmény és serdülőkor kapcsolata?", v: "Teljesítmény ingadozhat az érzelmi viharok miatt. Belső motiváció fenntartása, reális elvárások és pozitív visszajelzés kulcsfontosságú." },
      { k: "Mi jellemzi az óvodás gyermek érzelmi fejlődését?", v: "Érzelmek hevesek, gyorsan változók. Félelemek tipikusak (sötét, szörnyek). Empátia csírái megjelennek. A familia érzelmi melegségének kiemelkedő szerepe." },
    ],
    fogalmak: [
      { f: "Óvodáskor", m: "3-6 éves kor. A gyerek főként játékkal tanul – ez a vezető tevékenysége. Fantáziája virágzik, és megtanulja az alapvető szociális szabályokat." },
      { f: "Iskolaérettség", m: "Az a fejlettségi szint, amikor egy gyerek készen áll az iskolára – tud figyelni, önállóan dolgozni, és szociálisan is érett." },
      { f: "Kisiskoláskor", m: "6-10 éves kor. A gyerek logikusan gondolkodik, de csak konkrét dolgokon. Fontos lesz neki, hogy jó legyen valamiben – ez adja az önbizalmát." },
      { f: "Serdülőkor", m: "10-18 éves kor. A pubertás és az identitáskeresés időszaka. 'Ki vagyok én?' – ez a fő kérdés. Testük megváltozik, a kortársak fontossá válnak." },
      { f: "Pubertás", m: "A nemi érés folyamata – testi változások jelzik, hogy a gyerekből felnőtt lesz. Hormonok, fizikai változások, és velük együtt hangulatingadozások." },
      { f: "Identitáskeresés", m: "Serdülőkorban megkérdőjelezünk mindent: ki vagyok, miben hiszek, mi akarok lenni? Ez normális – a felnőtt identitás csak fokozatosan alakul ki." },
      { f: "Formális műveleti gondolkodás", m: "Kb. 12 évtől elvontan is tudunk gondolkodni – nem csak konkrét tárgyakra, hanem elméletekre, feltételezésekre is." },
    ]
